<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>殭屍獵人</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
    body {
      background: #070a12;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      height: 100dvh; overflow: hidden; touch-action: none;
    }
    canvas { display: block; border-radius: 12px; }
    #endActions {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 45;
      gap: 10px;
      width: min(420px, 94vw);
    }
    #endActions button, .home-link-btn {
      flex: 1;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid rgba(0,245,255,0.7);
      background: rgba(0,245,255,0.12);
      color: #0ff;
      cursor: pointer;
      font: 700 0.9rem Orbitron, sans-serif;
    }
    #endActions .home-link-btn, .home-link-btn {
      border-color: rgba(255,255,255,0.38);
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    /* ── D-pad ── */
    #dpad {
      display: none;
      grid-template-areas: ". up ." "left cx right" ". down .";
      gap: 6px; margin-top: 12px;
    }
    .dp {
      width: 58px; height: 58px;
      background: rgba(0,245,255,0.10);
      border: 2px solid rgba(0,245,255,0.28);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: rgba(0,245,255,0.75);
      cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: none;
      transition: background .1s;
    }
    .dp:active, .dp.pressed { background: rgba(0,245,255,0.28); }
    #dp-up    { grid-area: up; }
    #dp-left  { grid-area: left; }
    #dp-right { grid-area: right; }
    #dp-down  { grid-area: down; }
    #dp-cx    { grid-area: cx; pointer-events: none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dpad">
  <div class="dp" id="dp-up">↑</div>
  <div class="dp" id="dp-left">←</div>
  <div id="dp-cx"></div>
  <div class="dp" id="dp-right">→</div>
  <div class="dp" id="dp-down">↓</div>
</div>
<div id="endActions">
  <button type="button" onclick="startGame()">再玩一次</button>
  <button class="home-link-btn" type="button" onclick="window.location.href='../../index.html'">回主畫面</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpad   = document.getElementById('dpad');
let W, H;

const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function resize() {
  const dpadH = isTouch ? 148 : 0;
  const sz = Math.min(window.innerWidth, window.innerHeight - dpadH, 640);
  W = canvas.width  = Math.floor(sz);
  H = canvas.height = Math.floor(sz);
  dpad.style.display = isTouch ? 'grid' : 'none';
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const KILL_TARGET      = 15;
const TOTAL_TIME       = 90;
const ZOMBIE_COUNT     = 4;
const HUNTER_DURATION  = 8;
const HUNTER_COOLDOWN  = 12;
const PLAYER_SPEED     = 220;
const ZOMBIE_SPEED     = 75;
const ZOMBIE_HUNT_SPD  = 35;
const FAST_ZOMBIE_SPD  = 155;
const GIANT_ZOMBIE_SPD = 42;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let state = 'menu'; // menu / playing / win / lose
let kills, lives, timeLeft;
let hunterMode, hunterTimer;
let lastScore = 0;
let lightningFlashes = [];
let bloodDrops = [];
let radarAngle = 0;
let radarPings = [];
let skullParticles = [];

// ═══════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════
const player = { x: 0, y: 0, r: 15 };

// ═══════════════════════════════════════════════════════
//  ZOMBIES
// ═══════════════════════════════════════════════════════
let zombies = [];
let frostSlowTimer = 0;

// 在畫面內隨機位置重生，避開玩家
function respawn(z) {
  const margin = z.r + 20;
  do {
    z.x = margin + Math.random() * (W - margin * 2);
    z.y = margin + Math.random() * (H - margin * 2);
  } while (Math.hypot(z.x - player.x, z.y - player.y) < 130);
  z.vx = 0; z.vy = 0;
}

function makeZombie(chaser = false, fast = false, giant = false, invisible = false, teleport = false, frost = false) {
  const z = { x: 0, y: 0, vx: 0, vy: 0,
              r: frost ? 20 : (chaser ? 19 : (fast ? 12 : (giant ? 32 : 17))),
              chaser, fast, giant, invisible, teleport, frost,
              hp: giant ? 3 : 1,
              wobble: Math.random() * Math.PI * 2,
              wSpd: fast ? 3.5 : (1.2 + Math.random() * 1.5),
              teleTimer: 3.0,
              invincible: 0 };
  respawn(z);
  return z;
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
let particles = [];

function burst(x, y, color, n = 14) {
  for (let i = 0; i < n; i++) {
    const a  = Math.random() * Math.PI * 2;
    const sp = 70 + Math.random() * 200;
    const ml = 0.35 + Math.random() * 0.35;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
                     r: 2 + Math.random()*3, color, life: ml, ml });
  }
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
const keys = {};
const td   = { up:false, down:false, left:false, right:false };

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state !== 'playing') startGame();
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
      e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// D-pad touch
function bindDpad(id, dir) {
  const el = document.getElementById(id);
  const on  = e => { e.preventDefault(); td[dir] = true;  el.classList.add('pressed'); };
  const off = ()  => { td[dir] = false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart', on,  { passive:false });
  el.addEventListener('touchend',   off);
  el.addEventListener('touchcancel',off);
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
bindDpad('dp-up','up'); bindDpad('dp-down','down');
bindDpad('dp-left','left'); bindDpad('dp-right','right');

canvas.addEventListener('pointerdown', () => { if (state !== 'playing') startGame(); });

// ═══════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════
function startGame() {
  document.getElementById('endActions').style.display = 'none';
  const lbBox = document.getElementById('lbBox');
  if (lbBox) lbBox.style.display = 'none';
  kills = 0; lives = 3;
  timeLeft  = TOTAL_TIME;
  hunterMode  = false;
  hunterTimer = HUNTER_COOLDOWN;
  player.x = W / 2; player.y = H / 2;
  particles = [];
  frostSlowTimer = 0;
  // 1 普通 + 1 快速 + 1 巨型 + 1 追殺者 + 1 隱形 + 1 傳送 + 1 冰霜
  zombies = [
    makeZombie(false),
    makeZombie(false, true),               // fast
    makeZombie(false, false, true),        // giant
    makeZombie(true),                      // chaser
    makeZombie(false, false, false, true),  // invisible
    makeZombie(false, false, false, false, true),  // teleport
    makeZombie(false, false, false, false, false, true)  // frost
  ];
  state = 'playing';
}

function update(dt) {
  if (state !== 'playing') return;

  // Timers
  timeLeft -= dt;
  if (timeLeft <= 0) { state = 'lose'; return; }
  if (frostSlowTimer > 0) frostSlowTimer -= dt;

  hunterTimer -= dt;
  if (hunterTimer <= 0) {
    hunterMode  = !hunterMode;
    hunterTimer = hunterMode ? HUNTER_DURATION : HUNTER_COOLDOWN;
  }

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A'] || td.left)  dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || td.right) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W'] || td.up)    dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S'] || td.down)  dy += 1;
  if (dx || dy) {
    const l = Math.sqrt(dx*dx + dy*dy);
    player.x += (dx/l) * PLAYER_SPEED * dt;
    player.y += (dy/l) * PLAYER_SPEED * dt;
  }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // Zombies
  for (const z of zombies) {
    updateZombie(z, dt);
    if (state !== 'playing') return;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 80 * dt;  // gravity
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateZombie(z, dt) {
  z.wobble += z.wSpd * dt;
  if (z.invincible > 0) z.invincible -= dt;

  const frostMul = frostSlowTimer > 0 ? 0.45 : 1;

  if (z.teleport) {
    // ── 傳送殭屍：每 3 秒隨機傳送 ──
    z.teleTimer -= dt;
    if (z.teleTimer <= 0) {
      respawn(z);
      z.teleTimer = 2.5 + Math.random() * 1.5;
      z.invincible = 0.4;
    }
    // 緩慢漂移
    const nx = Math.cos(z.wobble) * 0.6, ny = Math.sin(z.wobble * 1.3) * 0.6;
    const spd = (hunterMode ? ZOMBIE_HUNT_SPD * 0.4 : ZOMBIE_SPEED * 0.5) * frostMul;
    z.vx = nx * spd; z.vy = ny * spd;
  } else if (z.frost) {
    // ── 冰霜殭屍：斜向漂移，擊殺後冰凍全場 ──
    const ex = z.x - player.x, ey = z.y - player.y;
    const ed = Math.sqrt(ex*ex + ey*ey) || 1;
    const side = Math.sin(z.wobble * 1.7);
    let fx = ex / ed + side * 0.9;
    let fy = ey / ed + Math.cos(z.wobble) * 0.55;
    const fl = Math.sqrt(fx*fx + fy*fy) || 1;
    const spd = (hunterMode ? ZOMBIE_HUNT_SPD * 0.45 : ZOMBIE_SPEED * 0.8) * frostMul;
    z.vx = (fx/fl) * spd; z.vy = (fy/fl) * spd;
  } else if (z.chaser) {
    // ── 紅色追殺者：追玩家 ──
    const tx = player.x - z.x, ty = player.y - z.y;
    const td = Math.sqrt(tx*tx + ty*ty) || 1;
    const spd = (hunterMode ? ZOMBIE_HUNT_SPD : ZOMBIE_SPEED * 1.1) * frostMul;
    z.vx = (tx/td) * spd;
    z.vy = (ty/td) * spd;
  } else if (z.fast) {
    // ── 快速殭屍：極速逃離，幾乎沒有隨機性 ──
    const ex = z.x - player.x, ey = z.y - player.y;
    const ed = Math.sqrt(ex*ex + ey*ey) || 1;
    const spd = (hunterMode ? ZOMBIE_HUNT_SPD * 0.6 : FAST_ZOMBIE_SPD) * frostMul;
    z.vx = (ex/ed) * spd;
    z.vy = (ey/ed) * spd;
  } else if (z.giant) {
    // ── 巨型殭屍：緩慢逃離，需擊中 3 次才死 ──
    const ex = z.x - player.x, ey = z.y - player.y;
    const ed = Math.sqrt(ex*ex + ey*ey) || 1;
    const noiseAmt = 0.4;
    const nx = Math.cos(z.wobble) * noiseAmt, ny = Math.sin(z.wobble * 1.2) * noiseAmt;
    let fx = ex/ed + nx, fy = ey/ed + ny;
    const fl = Math.sqrt(fx*fx + fy*fy) || 1;
    const spd = (hunterMode ? ZOMBIE_HUNT_SPD * 0.5 : GIANT_ZOMBIE_SPD) * frostMul;
    z.vx = (fx/fl) * spd; z.vy = (fy/fl) * spd;
  } else {
    // ── 普通殭屍：逃離玩家 ──
    const ex = z.x - player.x, ey = z.y - player.y;
    const ed = Math.sqrt(ex*ex + ey*ey) || 1;
    const noiseAmt = hunterMode ? 0.3 : 0.85;
    const nx = Math.cos(z.wobble) * noiseAmt;
    const ny = Math.sin(z.wobble * 1.4) * noiseAmt;
    let fx = ex/ed + nx, fy = ey/ed + ny;
    const fl = Math.sqrt(fx*fx + fy*fy) || 1;
    const spd = (hunterMode ? ZOMBIE_HUNT_SPD : ZOMBIE_SPEED) * frostMul;
    z.vx = (fx/fl) * spd;
    z.vy = (fy/fl) * spd;
  }

  z.x += z.vx * dt;
  z.y += z.vy * dt;

  // ── 所有殭屍都彈牆，永不出界 ──
  if (z.x < z.r)   { z.x = z.r;   z.vx =  Math.abs(z.vx); }
  if (z.x > W-z.r) { z.x = W-z.r; z.vx = -Math.abs(z.vx); }
  if (z.y < z.r)   { z.y = z.r;   z.vy =  Math.abs(z.vy); }
  if (z.y > H-z.r) { z.y = H-z.r; z.vy = -Math.abs(z.vy); }

  // ── 碰撞判定 ──
  if (z.invincible > 0) return; // 剛重生的無敵期
  const cdx = player.x - z.x, cdy = player.y - z.y;
  if (Math.hypot(cdx, cdy) < player.r + z.r) {
    if (z.chaser) {
      // 追殺者碰到玩家 → 扣命
      lives--;
      burst(z.x, z.y, '#ff2222', 18);
      if (lives <= 0) { state = 'lose'; return; }
      respawn(z);
      z.invincible = 1.5; // 1.5s 無敵，防止重生後立刻再扣
    } else if (z.giant) {
      z.hp--;
      burst(z.x, z.y, '#ff8800', 10);
      if (z.hp <= 0) {
        kills += 3;
        burst(z.x, z.y, '#ffaa00', 28);
        if (kills >= KILL_TARGET) {
          lastScore = Math.floor(timeLeft * 80) + lives * 500;
          state = 'win';
          if (window.onZombieHunterEnd) window.onZombieHunterEnd(lastScore, kills, lives, timeLeft);
          return;
        }
        respawn(z); z.hp = 3; z.invincible = 1.5;
      } else { z.invincible = 0.8; }
    } else if (z.frost) {
      kills += 2;
      frostSlowTimer = 3.0;
      burst(z.x, z.y, '#9be7ff', 26);
      burst(z.x, z.y, '#ffffff', 16);
      if (kills >= KILL_TARGET) {
        lastScore = Math.floor(timeLeft * 80) + lives * 500;
        state = 'win';
        if (window.onZombieHunterEnd) window.onZombieHunterEnd(lastScore, kills, lives, timeLeft);
        return;
      }
      respawn(z); z.invincible = 1.2;
    } else {
      // 普通殭屍被追到 → 擊殺
      kills++;
      burst(z.x, z.y, hunterMode ? '#ff9900' : '#00ff88', 16);
      if (kills >= KILL_TARGET) {
        lastScore = Math.floor(timeLeft * 80) + lives * 500;
        state = 'win';
        if (window.onZombieHunterEnd) window.onZombieHunterEnd(lastScore, kills, lives, timeLeft);
        return;
      }
      respawn(z);
      z.invincible = 0.5;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
let lastTS = 0;

function frame(ts) {
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTS = ts;
  update(dt);

  // BG
  ctx.fillStyle = '#070a12';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,200,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  if (state === 'menu') { drawMenu(ts); requestAnimationFrame(frame); return; }

  // Hunter mode border pulse
  if (hunterMode && state === 'playing') {
    ctx.save();
    ctx.strokeStyle = `rgba(255,140,0,${0.45 + 0.3*Math.sin(ts*0.006)})`;
    ctx.lineWidth = 10;
    ctx.shadowBlur = 22; ctx.shadowColor = '#ff8800';
    ctx.strokeRect(5, 5, W-10, H-10);
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.ml);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Zombies
  for (const z of zombies) drawZombie(z, ts);

  // Player
  drawPlayer(ts);

  // HUD
  drawHUD(ts);

  // End overlays
  if (state === 'win')  drawEnd('CLEAR! 🎉', '#00ff88', `成功獵殺 ${KILL_TARGET} 隻殭屍！\n得分：${lastScore.toLocaleString()}`);
  if (state === 'lose') drawEnd('GAME OVER', '#ff4444', lives <= 0 ? '被 💀 追殺者抓住了...' : '⏰ 時間到了！');

  requestAnimationFrame(frame);
}

function drawPlayer(ts) {
  const pulse = 0.85 + 0.15 * Math.sin(ts * 0.004);
  ctx.save();
  ctx.shadowBlur = 24 * pulse; ctx.shadowColor = '#00f5ff';
  // Outer glow
  const g = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r * 1.8);
  g.addColorStop(0, 'rgba(0,245,255,0.7)');
  g.addColorStop(0.5, 'rgba(0,120,255,0.4)');
  g.addColorStop(1, 'rgba(0,50,200,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r * 1.8, 0, Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle = '#00f5ff';
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
  // Icon
  ctx.shadowBlur = 0;
  ctx.font = `${player.r * 1.5}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🏹', player.x, player.y + 1);
  ctx.restore();
}

function drawZombie(z, ts) {
  const pulse = 0.75 + 0.25 * Math.sin(ts * 0.003 + z.wobble);
  let col, glow, icon;
  if (z.teleport) {
    const alpha = 0.6 + 0.4 * Math.sin(Date.now() * 0.008 + z.wobble);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 22 * pulse; ctx.shadowColor = '#ff00ff';
    ctx.fillStyle = '#cc00ff';
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = alpha;
    ctx.font = `${z.r * 1.5}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🌀', z.x, z.y + 1);
    ctx.restore();
    return;
  }
  if (z.frost) {
    ctx.save();
    ctx.shadowBlur = 26 * pulse; ctx.shadowColor = '#9be7ff';
    const g = ctx.createRadialGradient(z.x, z.y, 0, z.x, z.y, z.r * 1.9);
    g.addColorStop(0, 'rgba(155,231,255,0.78)');
    g.addColorStop(1, 'rgba(20,120,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 1.9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = hunterMode ? '#bdf7ff' : '#54d9ff';
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.font = `${z.r * 1.45}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('❄️', z.x, z.y + 1);
    ctx.restore();
    return;
  }
  if (z.invisible) {
    // 隱形殭屍：幾乎不可見，獵人模式才現形
    const alpha = hunterMode ? 0.85 : (0.1 + 0.08 * Math.sin(ts * 0.005 + z.wobble));
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = hunterMode ? 18 : 6;
    ctx.shadowColor = '#aaffee';
    ctx.fillStyle = '#aaffee';
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = hunterMode ? alpha : alpha * 2;
    ctx.font = `${z.r * 1.5}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('👻', z.x, z.y + 1);
    ctx.restore();
    return;
  }
  if (z.chaser) {
    col  = hunterMode ? '#ff6600' : '#ff2222';
    glow = hunterMode ? '#aa3300' : '#aa0000';
    icon = '💀';
  } else if (z.fast) {
    col  = hunterMode ? '#ffdd00' : '#cc88ff';
    glow = hunterMode ? '#aa8800' : '#8800cc';
    icon = '⚡';
  } else if (z.giant) {
    col  = hunterMode ? '#ff6600' : '#ff8800';
    glow = hunterMode ? '#cc3300' : '#cc5500';
    icon = z.hp === 3 ? '👾' : (z.hp === 2 ? '😤' : '😵');
  } else {
    col  = hunterMode ? '#ff9900' : '#33dd66';
    glow = hunterMode ? '#cc6600' : '#009933';
    icon = '🧟';
  }
  ctx.save();
  ctx.shadowBlur = 16 * pulse; ctx.shadowColor = glow;
  // Glow halo
  const g = ctx.createRadialGradient(z.x, z.y, 0, z.x, z.y, z.r * 1.6);
  g.addColorStop(0, col + 'bb'); g.addColorStop(1, glow + '00');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(z.x, z.y, z.r * 1.6, 0, Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, Math.PI*2); ctx.fill();
  // Icon
  ctx.shadowBlur = 0;
  ctx.font = `${z.r * 1.5}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(icon, z.x, z.y + 1);
  ctx.restore();
}

function drawHUD(ts) {
  const pad = 12;
  ctx.shadowBlur = 0; ctx.textBaseline = 'top';

  // Left: lives + kills
  const heartOn = '❤️', heartOff = '🖤';
  const livesStr = heartOn.repeat(lives) + heartOff.repeat(Math.max(0, 3-lives));
  ctx.font = 'bold 13px Orbitron, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`生命: ${livesStr}   擊殺: ${kills}/${KILL_TARGET}`, pad, pad);

  // Right: timer
  const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
  const s = Math.floor(Math.max(0, timeLeft % 60)).toString().padStart(2,'0');
  ctx.textAlign = 'right';
  ctx.fillText(`剩餘時間: ${m}:${s}`, W - pad, pad);

  // Center: hunter mode
  ctx.textAlign = 'center';
  if (hunterMode) {
    ctx.fillStyle = '#ff9900';
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff9900';
    ctx.font = 'bold 13px Orbitron, sans-serif';
    ctx.fillText(`🔥 獵人模式  ${hunterTimer.toFixed(1)}s`, W/2, pad);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '12px Orbitron, sans-serif';
    ctx.fillText(`獵人模式: ${hunterTimer.toFixed(1)}s`, W/2, pad);
  }
  if (frostSlowTimer > 0) {
    ctx.fillStyle = '#9be7ff';
    ctx.shadowBlur = 12; ctx.shadowColor = '#9be7ff';
    ctx.font = 'bold 12px Orbitron, sans-serif';
    ctx.fillText(`❄️ 冰霜緩速 ${frostSlowTimer.toFixed(1)}s`, W/2, pad + 18);
    ctx.shadowBlur = 0;
  }

  // Bottom hint
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(isTouch ? '操作：D-pad 移動' : '操作：方向鍵 / WASD 移動', pad, H - 18);
  ctx.textAlign = 'right';
  ctx.fillText('💀 紅色追殺者碰到你會扣命', W - pad, H - 18);
}

function drawMenu(ts) {
  // Floating ghost zombies in BG
  for (let i = 0; i < 6; i++) {
    const bx = W * (0.12 + i * 0.15) + Math.sin(ts * 0.001 + i * 1.1) * 25;
    const by = H * 0.55 + Math.cos(ts * 0.0009 + i * 0.8) * 30;
    ctx.globalAlpha = 0.07;
    ctx.font = '48px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#00ff88'; ctx.fillText('🧟', bx, by);
  }
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.shadowBlur = 35; ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 42px Orbitron, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('殭屍獵人', W/2, H * 0.28);
  ctx.restore();

  ctx.fillStyle = '#bbb'; ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  const lines = [
    '🧟  追上綠色殭屍來擊殺（牠們會逃跑）',
    '💀  紅色追殺者會追你！碰到會扣一條命',
    `🔥  獵人模式 (${HUNTER_DURATION}s)：殭屍大幅減速`,
    '',
    `目標：擊殺 ${KILL_TARGET} 隻綠色殭屍`,
  ];
  lines.forEach((l, i) => {
    ctx.fillText(l, W/2, H * 0.44 + i * 26);
  });

  const blink = 0.6 + 0.4 * Math.sin(ts * 0.003);
  ctx.fillStyle = `rgba(0,245,255,${blink})`;
  ctx.font = 'bold 15px Orbitron, sans-serif';
  ctx.fillText('按任意鍵 ／ 點擊 開始', W/2, H * 0.76);

  // ── 版號 ──
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '11px Orbitron, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('Release v1.0.5', W - 8, H - 8);

  // ── 怪物說明 ──
  ctx.fillStyle = 'rgba(200,136,255,0.7)';
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('⚡ 紫色閃電殭屍：速度極快  👾 橘色巨型殭屍：需擊中 3 次 (+3 分)', W/2, H * 0.84);
  ctx.fillStyle = 'rgba(170,255,238,0.65)';
  ctx.fillText('👻 隱形殭屍：幾乎看不見！獵人模式才現形', W/2, H * 0.89);
  ctx.fillStyle = 'rgba(204,0,255,0.65)';
  ctx.fillText('🌀 紫色傳送殭屍：每 3 秒隨機傳送位置', W/2, H * 0.93);
  ctx.fillStyle = 'rgba(155,231,255,0.72)';
  ctx.fillText('❄️ 冰霜殭屍：擊殺 +2，並讓全場緩速 3 秒', W/2, H * 0.97);

  // ── 骷髏粒子特效 ──
  if (Math.random() < 0.08) {
    skullParticles.push({ x: Math.random() * W, y: H + 20, vy: -(40 + Math.random() * 60), life: 1.0, size: 14 + Math.random() * 10 });
  }
  for (let i = skullParticles.length - 1; i >= 0; i--) {
    const sp = skullParticles[i];
    sp.y += sp.vy * 0.016; sp.life -= 0.008;
    if (sp.life <= 0 || sp.y < -30) { skullParticles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = sp.life * 0.55;
    ctx.font = `${sp.size}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💀', sp.x, sp.y);
    ctx.restore();
  }

  // ── 雷達掃描特效 ──
  radarAngle += 0.025;
  const radarCx = W * 0.85, radarCy = H * 0.18, radarR = 45;
  if (Math.random() < 0.04) radarPings.push({ r: 0, life: 1.0 });
  ctx.save();
  ctx.beginPath(); ctx.arc(radarCx, radarCy, radarR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,255,120,0.25)'; ctx.lineWidth = 1; ctx.stroke();
  [radarR * 0.5, radarR].forEach(rr => {
    ctx.beginPath(); ctx.arc(radarCx, radarCy, rr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,255,120,0.15)'; ctx.stroke();
  });
  const grad = ctx.createConicalGradient ? null : null;
  ctx.beginPath();
  ctx.moveTo(radarCx, radarCy);
  ctx.arc(radarCx, radarCy, radarR, radarAngle - 0.8, radarAngle);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,255,120,0.18)'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(radarCx, radarCy);
  ctx.lineTo(radarCx + Math.cos(radarAngle) * radarR, radarCy + Math.sin(radarAngle) * radarR);
  ctx.strokeStyle = 'rgba(0,255,120,0.9)'; ctx.lineWidth = 1.5; ctx.stroke();
  for (let i = radarPings.length - 1; i >= 0; i--) {
    const p = radarPings[i];
    p.r += 0.8; p.life -= 0.025;
    if (p.r > radarR || p.life <= 0) { radarPings.splice(i, 1); continue; }
    const px = radarCx + Math.cos(radarAngle) * p.r;
    const py = radarCy + Math.sin(radarAngle) * p.r;
    ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,255,180,${p.life})`; ctx.fill();
  }
  ctx.restore();

  // ── 血滴特效 ──
  if (Math.random() < 0.06) {
    bloodDrops.push({ x: Math.random() * W, y: 0, vy: 60 + Math.random() * 80, r: 3 + Math.random() * 4, life: 1.0 });
  }
  for (let i = bloodDrops.length - 1; i >= 0; i--) {
    const d = bloodDrops[i];
    d.y += d.vy * 0.016; d.vy += 120 * 0.016; d.life -= 0.012;
    if (d.life <= 0 || d.y > H) { bloodDrops.splice(i, 1); continue; }
    ctx.save(); ctx.globalAlpha = d.life * 0.7;
    ctx.fillStyle = '#cc0000'; ctx.shadowBlur = 4; ctx.shadowColor = '#ff0000';
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // ── 閃電特效 ──
  if (Math.random() < 0.015) {
    lightningFlashes.push({ x: Math.random() * W, life: 1.0 });
  }
  for (let i = lightningFlashes.length - 1; i >= 0; i--) {
    const lf = lightningFlashes[i];
    lf.life -= 0.08;
    if (lf.life <= 0) { lightningFlashes.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = lf.life;
    ctx.strokeStyle = '#cc88ff'; ctx.lineWidth = 2;
    ctx.shadowBlur = 12; ctx.shadowColor = '#cc88ff';
    let cy = 0, cx = lf.x;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    while (cy < H * 0.85) {
      cx += (Math.random() - 0.5) * 30;
      cy += 20 + Math.random() * 20;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke(); ctx.restore();
  }
}

function drawEnd(title, color, sub) {
  document.getElementById('endActions').style.display = 'flex';
  ctx.fillStyle = 'rgba(7,10,18,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowBlur = 38; ctx.shadowColor = color;
  ctx.fillStyle = color;
  ctx.font = 'bold 52px Orbitron, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(title, W/2, H * 0.35);
  ctx.restore();

  ctx.fillStyle = '#ddd'; ctx.font = '17px sans-serif';
  sub.split('\n').forEach((l, i) => {
    ctx.fillText(l, W/2, H * 0.5 + i * 28);
  });

  const blink = 0.6 + 0.4 * Math.sin(Date.now() * 0.003);
  ctx.fillStyle = `rgba(0,245,255,${blink})`;
  ctx.font = 'bold 14px Orbitron, sans-serif';
  ctx.fillText('按任意鍵 ／ 點擊 重新開始', W/2, H * 0.7);

  // Leaderboard section (shown below if win)
  if (state === 'win' && document.getElementById('lbBox')) {
    document.getElementById('lbBox').style.display = 'block';
  }
}

// ═══════════════════════════════════════════════════════
//  START

requestAnimationFrame(frame);
</script>

<script>
(function() {
  const CFG = {
    apiKey: "AIzaSyCFVDsAvTx10-eshL3RYiSzyYlPFEvqyz8",
    authDomain: "claude-code-project-3a0d3.firebaseapp.com",
    projectId: "claude-code-project-3a0d3",
    storageBucket: "claude-code-project-3a0d3.firebasestorage.app",
    messagingSenderId: "451203824543",
    appId: "1:451203824543:web:fa2e9bb8c2c0f69c339baa"
  };
  if (!firebase.apps.length) firebase.initializeApp(CFG);
  const db  = firebase.firestore();
  const COL = 'zombie_hunter';

  let curScore = 0, curKills = 0, submitted = false;

  window.onZombieHunterEnd = function(score, kills, livesLeft, timeLeft) {
    curScore = score; curKills = kills;
    submitted = false;
    document.getElementById('lbSubmit').disabled = false;
    document.getElementById('lbSubmit').textContent = '送出 🚀';
    document.getElementById('lbName').value = '';
    document.getElementById('lbInput').style.display = 'block';
    document.getElementById('lbList').style.display  = 'none';
    document.getElementById('lbBox').style.display   = 'block';
  };

  async function showLB(myName) {
    document.getElementById('lbInput').style.display = 'none';
    document.getElementById('lbList').style.display  = 'block';
    const rows = document.getElementById('lbRows');
    rows.innerHTML = '<p style="color:#666;font-size:.85rem;text-align:center">載入中...</p>';
    try {
      const snap = await db.collection(COL).orderBy('score','desc').limit(10).get();
      const data = []; snap.forEach(d => data.push(d.data()));
      if (!data.length) { rows.innerHTML = '<p style="color:#666;font-size:.85rem;text-align:center">還沒有紀錄！</p>'; return; }
      const medals = ['🥇','🥈','🥉'];
      rows.innerHTML = data.map((r,i) => {
        const mine = myName && r.name === myName && r.score === curScore;
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;
                  margin-bottom:4px;border-radius:5px;font-size:.85rem;
                  background:${mine ? 'rgba(0,255,255,0.15)' : 'rgba(0,255,255,0.06)'};
                  border:1px solid ${mine ? '#0ff' : 'rgba(0,255,255,0.1)'}">
          <span style="width:26px;color:#0ff;font-weight:700">${medals[i]||(i+1)}</span>
          <span style="flex:1;color:#fff">${r.name}</span>
          <span style="color:#0ff;font-weight:700;text-shadow:0 0 6px #0ff">${r.score.toLocaleString()}</span>
        </div>`;
      }).join('');
    } catch(e) {
      rows.innerHTML = '<p style="color:#f44;font-size:.85rem;text-align:center">載入失敗，請確認網路</p>';
    }
  }

  document.getElementById('lbSubmit').addEventListener('click', async function() {
    if (submitted) return;
    const name = document.getElementById('lbName').value.trim() || '匿名';
    submitted = true; this.disabled = true; this.textContent = '送出中...';
    try {
      await db.collection(COL).add({
        name, score: curScore, kills: curKills,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) { console.error(e); }
    showLB(name);
  });

  document.getElementById('lbSkip').addEventListener('click', () => showLB(null));
})();
</script>
