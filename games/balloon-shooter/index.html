<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>射氣球大作戰 - 無敵星星音效版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #game { display: block; width: 100vw; height: 100vh; cursor: none; touch-action: none; }
  #ui {
    position: fixed; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-start;
    color: #fff; font-weight: 700; pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  #score, #timer { font-size: 28px; background: rgba(0,0,0,0.3); padding: 8px 14px; border-radius: 12px; backdrop-filter: blur(6px); }
  #timer.warn { color: #ff4d4d; font-size: 36px; transform: scale(1.1); }
  #invincibleBar {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    padding: 6px 16px; border-radius: 20px;
    background: linear-gradient(90deg,#ffd700,#ff8c00);
    color: #fff; font-weight: 900; font-size: 18px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(255,215,0,0.8);
    display: none;
  }
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: #fff; text-align: center; padding: 20px;
    z-index: 10;
  }
  .overlay h1 { font-size: 48px; margin-bottom: 12px; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
  .overlay h2 { font-size: 36px; margin: 8px 0; }
  .overlay p { font-size: 18px; margin: 6px 0; max-width: 520px; line-height: 1.5; }
  .overlay button {
    margin-top: 24px; padding: 14px 36px; font-size: 22px; font-weight: 700;
    border: none; border-radius: 999px; cursor: pointer;
    background: linear-gradient(90deg,#ff6b6b,#ffa500); color: #fff;
    box-shadow: 0 8px 24px rgba(255,107,107,0.5);
    transition: transform 0.15s;
  }
  .overlay button:active { transform: scale(0.95); }
  .hidden { display: none !important; }
  .rules { font-size: 15px; opacity: 0.9; margin-top: 16px; }
  .rules span { display: inline-block; margin: 4px 8px; padding: 4px 10px; background: rgba(255,255,255,0.15); border-radius: 8px; }
  #shake { position: fixed; inset: 0; pointer-events: none; border: 0 solid rgba(255,0,0,0); transition: border-width 0.1s, border-color 0.1s; z-index: 5; }
  #introScreen {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #introScreen video {
    width: 100%; height: 100%; object-fit: contain;
  }
  #clickToStart {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.72); z-index: 102; cursor: pointer;
    color: #fff; text-align: center;
  }
  #clickToStart .pulse {
    font-size: 72px; animation: pulse 1.2s ease-in-out infinite;
  }
  #clickToStart p { font-size: 22px; margin-top: 16px; opacity: 0.85; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  #skipBtn {
    position: fixed; bottom: 28px; right: 28px;
    padding: 10px 24px; font-size: 16px; font-weight: 700;
    border: 2px solid rgba(255,255,255,0.7); border-radius: 999px;
    background: rgba(0,0,0,0.45); color: #fff; cursor: pointer;
    z-index: 103; backdrop-filter: blur(6px);
    transition: background 0.15s; display: none;
  }
  #skipBtn:hover { background: rgba(0,0,0,0.7); }

  /* 排行榜 */
  #nameInputSection { width:100%; max-width:360px; margin-top:14px; text-align:center; }
  #nameInputSection input {
    width:100%; padding:10px 16px; font-size:18px; border-radius:999px;
    border:2px solid rgba(255,255,255,0.5); background:rgba(255,255,255,0.15);
    color:#fff; text-align:center; margin-bottom:10px; outline:none;
    font-family:inherit; backdrop-filter:blur(4px);
  }
  #nameInputSection input::placeholder { color:rgba(255,255,255,0.45); }
  #nameInputSection .row { display:flex; gap:10px; justify-content:center; }
  .btn-skip {
    margin-top:0; padding:10px 22px; font-size:16px; font-weight:600;
    border:none; border-radius:999px; cursor:pointer;
    background:rgba(255,255,255,0.18); color:#fff; box-shadow:none;
    transition:transform .15s;
  }
  .btn-skip:active { transform:scale(0.95); }
  #leaderboardSection { width:100%; max-width:380px; margin-top:12px; }
  #leaderboardSection h3 { font-size:17px; margin-bottom:8px; letter-spacing:.5px; }
  .lb-row {
    display:flex; align-items:center; gap:8px; padding:7px 12px;
    margin-bottom:4px; border-radius:10px; background:rgba(255,255,255,0.12);
    font-size:15px;
  }
  .lb-mine { background:rgba(255,215,0,0.28)!important; border:1px solid rgba(255,215,0,0.55); }
  .lb-rank { width:26px; font-weight:900; font-size:16px; }
  .lb-name { flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-score { font-weight:700; color:#ffd700; white-space:nowrap; }
  .lb-msg { opacity:.6; font-size:14px; padding:6px 0; }
  @media (max-width: 700px), (max-height: 720px) {
    .overlay {
      justify-content: flex-start;
      height: 100dvh;
      min-height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: max(18px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    .overlay h1 { font-size: clamp(2rem, 10vw, 3rem); }
    .overlay h2 { font-size: clamp(1.7rem, 8vw, 2.4rem); }
    .overlay p { font-size: 0.95rem; }
    .overlay button {
      width: min(100%, 340px);
      margin-top: 14px;
      padding: 12px 20px;
      font-size: 1rem;
      touch-action: manipulation;
    }
    .rules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      width: min(100%, 360px);
      margin-top: 10px;
      font-size: 0.78rem;
    }
    .rules span {
      margin: 0;
      padding: 5px 7px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }
    #nameInputSection .row {
      display: grid;
      grid-template-columns: 1fr 0.8fr;
    }
  }
</style>
</head>
<body>
<div id="introScreen">
  <video id="introVideo" src="intro.mp4" playsinline preload="auto"></video>
  <div id="clickToStart">
    <div class="pulse">🎈</div>
    <p>點擊任意處開始</p>
  </div>
  <button id="skipBtn">跳過 ▶</button>
</div>

<canvas id="game"></canvas>
<div id="ui">
  <div id="score">分數: 0</div>
  <div id="timer">20</div>
</div>
<div id="invincibleBar">⭐ 無敵模式 ⭐</div>
<div id="freezeBar" style="position:fixed;top:100px;left:50%;transform:translateX(-50%);padding:6px 16px;border-radius:20px;background:linear-gradient(90deg,#00c8ff,#0077ff);color:#fff;font-weight:900;font-size:18px;text-shadow:0 2px 4px rgba(0,0,0,0.5);box-shadow:0 0 20px rgba(0,200,255,0.8);display:none">❄️ 凍結中 ❄️</div>
<div id="shake"></div>

<div id="startScreen" class="overlay">
  <h1>🎈 射氣球大作戰 🎈</h1>
  <p style="font-size:12px;opacity:0.45;margin-bottom:4px">Release v1.0.8</p>
  <p>20 秒內射破氣球並收集掉落物拿最高分！</p>
  <div class="rules">
    <span>🎈 氣球 +1</span>
    <span>🎁 禮物 +5</span>
    <span>💣 炸彈 -10</span>
    <span>⭐ 星星 → 無敵 5 秒</span>
    <span>❄️ 冰晶 → 凍結 5 秒</span>
    <span>🎯 三叉針 → 一次爆 3 顆</span>
    <span>⚡ 加速針 → 命中範圍放大 5 秒</span>
    <span>⏳ 時間沙漏 → 額外 +3 秒</span>
    <span>🌈 彩虹爆破 → 清空畫面氣球</span>
    <span>🔗 連鎖閃電 → 連爆最近 5 顆</span>
  </div>
  <p style="margin-top:14px;opacity:0.85">無敵模式：分數加倍，炸彈免疫還給 +5！</p>
  <button id="startBtn">開始遊戲</button>
</div>

<div id="endScreen" class="overlay hidden">
  <h1>⏰ 時間到！</h1>
  <h2 id="finalScore">分數：0</h2>
  <p id="finalComment"></p>
  <div id="nameInputSection">
    <p style="font-size:14px;opacity:.85;margin-bottom:8px">留下名字，上排行榜！</p>
    <input id="playerNameInput" type="text" placeholder="名字或座號（最多 8 字）" maxlength="8">
    <div class="row">
      <button id="submitScoreBtn">送出 🚀</button>
      <button class="btn-skip" id="skipScoreBtn">跳過</button>
    </div>
  </div>
  <div id="leaderboardSection" class="hidden">
    <h3>🏆 射氣球排行榜 Top 10</h3>
    <div id="leaderboardList"></div>
  </div>
  <button id="restartBtn" style="margin-top:16px">再玩一次</button>
  <button id="homeBtn" style="margin-top:10px" onclick="goHome()">回主畫面</button>
</div>

<script>
function goHome() {
  window.location.href = '../../index.html?skipIntro=1';
}

// ---- Intro Video ----
(function() {
  const introScreen = document.getElementById('introScreen');
  const introVideo = document.getElementById('introVideo');
  const clickToStart = document.getElementById('clickToStart');
  const skipBtn = document.getElementById('skipBtn');

  function finishIntro() {
    introVideo.pause();
    introScreen.classList.add('hidden');
  }

  introVideo.addEventListener('ended', finishIntro);
  skipBtn.addEventListener('click', function(e) { e.stopPropagation(); finishIntro(); });

  clickToStart.addEventListener('click', () => {
    clickToStart.classList.add('hidden');
    skipBtn.style.display = 'block';
    introVideo.play().catch(() => { finishIntro(); });
  });
})();

(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const timerEl = document.getElementById('timer');
  const invincibleBar = document.getElementById('invincibleBar');
  const startScreen = document.getElementById('startScreen');
  const endScreen = document.getElementById('endScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const finalScore = document.getElementById('finalScore');
  const finalComment = document.getElementById('finalComment');
  const shakeEl = document.getElementById('shake');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Audio ----
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playTone({ type = 'sine', from = 440, to = 440, dur = 0.15, vol = 0.25, delay = 0 }) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(from, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(to, 0.01), t0 + dur);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }
  const sfx = {
    pop() { playTone({ type: 'sine', from: 800, to: 100, dur: 0.15, vol: 0.3 }); },
    gift() { playTone({ type: 'square', from: 1200, to: 1200, dur: 0.08, vol: 0.22 }); playTone({ type: 'square', from: 1600, to: 1600, dur: 0.12, vol: 0.22, delay: 0.08 }); },
    bomb() { playTone({ type: 'sawtooth', from: 100, to: 10, dur: 0.5, vol: 0.35 }); },
    star() {
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C major arpeggio
      notes.forEach((f, i) => playTone({ type: 'square', from: f, to: f, dur: 0.15, vol: 0.22, delay: i * 0.08 }));
    },
    freeze() { [1046.5, 1318.5, 1567.98].forEach((f, i) => playTone({ type: 'sine', from: f, to: f * 0.5, dur: 0.4, vol: 0.2, delay: i * 0.07 })); },
    multiShot() { [800, 900, 1000].forEach((f, i) => playTone({ type: 'square', from: f, to: f, dur: 0.1, vol: 0.18, delay: i * 0.04 })); },
    magnet() { [300, 350, 400, 350].forEach((f, i) => playTone({ type: 'sine', from: f, to: f * 1.3, dur: 0.25, vol: 0.18, delay: i * 0.08 })); },
    shield() { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone({ type: 'sine', from: f, to: f, dur: 0.2, vol: 0.15, delay: i * 0.06 })); },
    speedUp() { [400, 600, 900, 1200].forEach((f, i) => playTone({ type: 'square', from: f, to: f * 1.5, dur: 0.1, vol: 0.2, delay: i * 0.05 })); },
    timeWarp() { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone({ type: 'triangle', from: f, to: f * 1.12, dur: 0.16, vol: 0.18, delay: i * 0.055 })); },
    rainbow() { [523.25, 659.25, 783.99, 987.77, 1318.51].forEach((f, i) => playTone({ type: 'sine', from: f, to: f * 1.18, dur: 0.18, vol: 0.2, delay: i * 0.045 })); },
    chain() { [880, 1320, 1760, 990, 1485].forEach((f, i) => playTone({ type: 'square', from: f, to: f * 0.72, dur: 0.12, vol: 0.16, delay: i * 0.035 })); },
    gameover() { playTone({ type: 'triangle', from: 300, to: 100, dur: 0.8, vol: 0.3 }); },
    bgmTick(high) {
      const f = high ? 987.77 : 783.99; // B5 / G5
      playTone({ type: 'square', from: f, to: f, dur: 0.08, vol: 0.1 });
    }
  };

  // ---- Game State ----
  const state = {
    score: 0,
    timeLeft: 20,
    frame: 0,
    running: false,
    balloons: [],
    items: [],
    particles: [],
    invincibleFrames: 0,
    freezeFrames: 0,
    multiShotFrames: 0,
    magnetFrames: 0,
    shieldFrames: 0,
    speedUpFrames: 0,
    hourglassFrames: 0,
    rainbowFrames: 0,
    chainFrames: 0,
    lightningBolts: [],
    spawnCounter: 0,
    mouse: { x: W / 2, y: H / 2 },
    shakeFrames: 0,
    bgmTick: 0,
  };

  // ---- Entities ----
  function spawnBalloon() {
    const radius = 30 + Math.random() * 20;
    const colors = ['#ff4d6d', '#4dabf7', '#51cf66', '#ffd43b', '#b197fc', '#ff922b', '#22b8cf'];
    state.balloons.push({
      x: Math.random() * (W - radius * 2) + radius,
      y: H + radius,
      r: radius,
      vy: -(3 + Math.random() * 3),
      baseX: 0,
      swing: 30 + Math.random() * 30,
      swingSpeed: 0.02 + Math.random() * 0.03,
      phase: Math.random() * Math.PI * 2,
      color: colors[(Math.random() * colors.length) | 0],
      alive: true,
    });
    const b = state.balloons[state.balloons.length - 1];
    b.baseX = b.x;
  }
  function spawnItem(type, x, y) {
    const base = { x, y, alive: true, rot: 0, vrot: (Math.random() - 0.5) * 0.2 };
    if (type === 'gift') state.items.push({ ...base, type, r: 22, vy: -3, g: 0.3, vx: (Math.random() - 0.5) * 2 });
    else if (type === 'bomb') state.items.push({ ...base, type, r: 24, vy: 0, g: 0.1, vx: (Math.random() - 0.5) * 1.5, spark: 0 });
    else if (type === 'star') state.items.push({ ...base, type, r: 26, vy: -5, g: 0.2, vx: (Math.random() - 0.5) * 2, glow: 0 });
    else if (type === 'freeze') state.items.push({ ...base, type, r: 22, vy: -2, g: 0.12, vx: (Math.random() - 0.5) * 1.5, angle: 0 });
    else if (type === 'multiShot') state.items.push({ ...base, type, r: 22, vy: -3, g: 0.18, vx: (Math.random() - 0.5) * 2, angle: 0 });
    else if (type === 'magnet') state.items.push({ ...base, type, r: 22, vy: -2.5, g: 0.14, vx: (Math.random() - 0.5) * 1.8, angle: 0 });
    else if (type === 'shield') state.items.push({ ...base, type, r: 22, vy: -2.8, g: 0.16, vx: (Math.random() - 0.5) * 1.6, angle: 0 });
    else if (type === 'speedUp') state.items.push({ ...base, type, r: 22, vy: -3.2, g: 0.17, vx: (Math.random() - 0.5) * 2, angle: 0 });
    else if (type === 'hourglass') state.items.push({ ...base, type, r: 22, vy: -2.6, g: 0.13, vx: (Math.random() - 0.5) * 1.7, angle: 0 });
    else if (type === 'rainbow') state.items.push({ ...base, type, r: 24, vy: -3.4, g: 0.15, vx: (Math.random() - 0.5) * 2.2, angle: 0 });
    else if (type === 'chain') state.items.push({ ...base, type, r: 23, vy: -3, g: 0.14, vx: (Math.random() - 0.5) * 2, angle: 0 });
  }
  function maybeDropFromBalloon(x, y) {
    const r = Math.random();
    if (r < 0.20) spawnItem('gift', x, y);
    else if (r < 0.53) spawnItem('bomb', x, y);
    else if (r < 0.68) spawnItem('star', x, y);
    else if (r < 0.80) spawnItem('freeze', x, y);
    else if (r < 0.90) spawnItem('multiShot', x, y);
    else if (r < 0.96) spawnItem('magnet', x, y);
    else if (r < 0.972) spawnItem('shield', x, y);
    else if (r < 0.987) spawnItem('speedUp', x, y);
    else if (r < 0.993) spawnItem('hourglass', x, y);
    else if (r < 0.998) spawnItem('chain', x, y);
    else spawnItem('rainbow', x, y);
  }
  function spawnParticles(x, y, color) {
    for (let i = 0; i < 15; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 2 + Math.random() * 4;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 1,
        life: 1,
        size: 2 + Math.random() * 3,
        color,
      });
    }
  }

  // ---- Drawing ----
  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    if (state.invincibleFrames > 0) {
      g.addColorStop(0, '#fff2a8');
      g.addColorStop(0.5, '#ffcc33');
      g.addColorStop(1, '#ff8c00');
    } else {
      g.addColorStop(0, '#89c7ff');
      g.addColorStop(1, '#dff1ff');
    }
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
  function drawBalloon(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    // string
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, b.r);
    ctx.quadraticCurveTo(8, b.r + 20, 0, b.r + 40);
    ctx.stroke();
    // body
    const grad = ctx.createRadialGradient(-b.r * 0.3, -b.r * 0.3, b.r * 0.1, 0, 0, b.r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, b.color);
    grad.addColorStop(1, shade(b.color, -0.3));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.r * 0.95, b.r, 0, 0, Math.PI * 2);
    ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-b.r * 0.35, -b.r * 0.4, b.r * 0.2, b.r * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    // knot
    ctx.fillStyle = shade(b.color, -0.3);
    ctx.beginPath();
    ctx.moveTo(-4, b.r - 2);
    ctx.lineTo(4, b.r - 2);
    ctx.lineTo(0, b.r + 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  function drawGift(it) {
    ctx.save();
    ctx.translate(it.x, it.y);
    ctx.rotate(it.rot);
    const s = it.r;
    // box
    ctx.fillStyle = '#f5b301';
    ctx.fillRect(-s, -s, s * 2, s * 2);
    ctx.strokeStyle = '#b27b00';
    ctx.lineWidth = 2;
    ctx.strokeRect(-s, -s, s * 2, s * 2);
    // ribbon
    ctx.fillStyle = '#e03131';
    ctx.fillRect(-s * 0.2, -s, s * 0.4, s * 2);
    ctx.fillRect(-s, -s * 0.2, s * 2, s * 0.4);
    // bow
    ctx.beginPath();

  function drawStar(it) {

  function shade(hex, pct) {
    const c = hex.replace('#', '');
    const num = parseInt(c, 16);
    let r = (num >> 16) & 0xff, g = (num >> 8) & 0xff, b = num & 0xff;
    r = Math.max(0, Math.min(255, r + Math.round(255 * pct)));
    g = Math.max(0, Math.min(255, g + Math.round(255 * pct)));
    b = Math.max(0, Math.min(255, b + Math.round(255 * pct)));
    return `rgb(${r},${g},${b})`;
  }

  // ---- Hit detection ----
  function tryHit(x, y) {
    // check topmost items first (items drawn after balloons, so prioritize them)
    for (let i = state.items.length - 1; i >= 0; i--) {
      const it = state.items[i];
      if (!it.alive) continue;
      const dx = x - it.x, dy = y - it.y;
      if (dx * dx + dy * dy <= (it.r + 6) * (it.r + 6)) {
        hitItem(it);
        return true;
      }
    }
    if (state.multiShotFrames > 0) {
      // pop up to 3 nearest balloons
      const alive = state.balloons.filter(b => b.alive);
      alive.sort((a, b) => Math.hypot(a.x - x, a.y - y) - Math.hypot(b.x - x, b.y - y));
      let hit = 0;
      for (const b of alive) { if (hit >= 3) break; hitBalloon(b); hit++; }
      return hit > 0;
    }
    const hitBonus = state.speedUpFrames > 0 ? 22 : 0;
    for (let i = state.balloons.length - 1; i >= 0; i--) {
      const b = state.balloons[i];
      if (!b.alive) continue;
      const dx = x - b.x, dy = y - b.y;
      if (dx * dx + dy * dy <= (b.r + 4 + hitBonus) * (b.r + 4 + hitBonus)) {
        hitBalloon(b);
        return true;
      }
    }
    return false;
  }
  function hitBalloon(b) {
    b.alive = false;
    const mult = state.invincibleFrames > 0 ? 2 : 1;
    state.score += 1 * mult;
    spawnParticles(b.x, b.y, b.color);
    sfx.pop();
    maybeDropFromBalloon(b.x, b.y);
    updateUI();
  }
  function hitItem(it) {
    it.alive = false;
    if (it.type === 'gift') {
      const mult = state.invincibleFrames > 0 ? 2 : 1;
      state.score += 5 * mult;
      spawnParticles(it.x, it.y, '#ffd43b');
      sfx.gift();
    } else if (it.type === 'bomb') {
      if (state.invincibleFrames > 0 || state.shieldFrames > 0) {
        state.score += state.invincibleFrames > 0 ? 5 : 0;
        spawnParticles(it.x, it.y, '#00ddff');
        spawnParticles(it.x, it.y, '#ffffff');
        sfx.freeze();
      } else {
        state.score -= 10;
        state.shakeFrames = 30;
        spawnParticles(it.x, it.y, '#333');
        sfx.bomb();
      }
    } else if (it.type === 'star') {
      state.invincibleFrames = 300;
      spawnParticles(it.x, it.y, '#ffd700');
      spawnParticles(it.x, it.y, '#fff');
      sfx.star();
    } else if (it.type === 'freeze') {
      state.freezeFrames = 300;
      spawnParticles(it.x, it.y, '#00c8ff');
      spawnParticles(it.x, it.y, '#ffffff');
      sfx.freeze();
    } else if (it.type === 'multiShot') {
      state.multiShotFrames = 300;
      spawnParticles(it.x, it.y, '#ff9900');
      spawnParticles(it.x, it.y, '#ffdd00');
      sfx.multiShot();
    } else if (it.type === 'magnet') {
      state.magnetFrames = 300;
      spawnParticles(it.x, it.y, '#ff4488');
      spawnParticles(it.x, it.y, '#4488ff');
      sfx.magnet();
    } else if (it.type === 'speedUp') {
      state.speedUpFrames = 300;
      spawnParticles(it.x, it.y, '#ffee00');
      spawnParticles(it.x, it.y, '#ff8800');
      sfx.speedUp();
    } else if (it.type === 'hourglass') {
      state.timeLeft = Math.min(30, state.timeLeft + 3);
      state.hourglassFrames = 120;
      spawnParticles(it.x, it.y, '#d7b7ff');
      spawnParticles(it.x, it.y, '#ffffff');
      sfx.timeWarp();
    } else if (it.type === 'rainbow') {
      let popped = 0;
      for (const b of state.balloons) {
        if (!b.alive) continue;
        b.alive = false;
        popped++;
        spawnParticles(b.x, b.y, b.color);
      }
      state.score += popped * (state.invincibleFrames > 0 ? 2 : 1);
      state.rainbowFrames = 120;
      state.shakeFrames = Math.max(state.shakeFrames, 18);
      spawnParticles(it.x, it.y, '#ff44cc');
      spawnParticles(it.x, it.y, '#33aaff');
      sfx.rainbow();
    } else if (it.type === 'chain') {
      const targets = state.balloons
        .filter(b => b.alive)
        .sort((a, b) => Math.hypot(a.x - it.x, a.y - it.y) - Math.hypot(b.x - it.x, b.y - it.y))
        .slice(0, 5);
      let from = { x: it.x, y: it.y };
      for (const b of targets) {
        b.alive = false;
        state.lightningBolts.push({ from, to: { x: b.x, y: b.y }, life: 1 });
        spawnParticles(b.x, b.y, '#8affff');
        spawnParticles(b.x, b.y, b.color);
        from = { x: b.x, y: b.y };
      }
      state.score += targets.length * (state.invincibleFrames > 0 ? 2 : 1);
      state.chainFrames = 90;
      state.shakeFrames = Math.max(state.shakeFrames, 12);
      spawnParticles(it.x, it.y, '#ffffff');
      sfx.chain();
    } else if (it.type === 'shield') {
      state.shieldFrames = 300;
      spawnParticles(it.x, it.y, '#00ddff');
      spawnParticles(it.x, it.y, '#ffffff');
      sfx.shield();
    }
    updateUI();
  }

  // ---- Loop ----
  function update() {
    state.frame++;

    // spawn balloons — baseline ~40 frames, ramps slightly faster over time
    state.spawnCounter++;
    const spawnEvery = Math.max(18, 40 - Math.floor((20 - state.timeLeft) * 0.8));
    if (state.spawnCounter >= spawnEvery) {
      spawnBalloon();
      state.spawnCounter = 0;
    }

    // multi-shot countdown
    if (state.multiShotFrames > 0) {
      state.multiShotFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#ff9900,#ffdd00)';
        bar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.7';
        bar.textContent = `🎯 三叉針 ${Math.ceil(state.multiShotFrames / 60)}s`;
      }
    } else if (state.freezeFrames <= 0 && state.magnetFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }

    // freeze countdown
    if (state.freezeFrames > 0) {
      state.freezeFrames--;
      const freezeBar = document.getElementById('freezeBar');
      freezeBar.style.display = 'block';
      freezeBar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.7';
      const secs = Math.ceil(state.freezeFrames / 60);
      freezeBar.textContent = `❄️ 凍結中 ${secs}s ❄️`;
    } else if (state.multiShotFrames <= 0 && state.magnetFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }

    // magnet countdown
    if (state.magnetFrames > 0) {
      state.magnetFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0 && state.multiShotFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#ff4488,#4488ff)';
        bar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.7';
        bar.textContent = `🧲 磁吸 ${Math.ceil(state.magnetFrames / 60)}s`;
      }
    } else if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.shieldFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }

    // shield countdown
    if (state.shieldFrames > 0) {
      state.shieldFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.speedUpFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#00ddff,#ffffff)';
        bar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.7';
        bar.textContent = `🛡️ 護盾 ${Math.ceil(state.shieldFrames / 60)}s`;
      }
    }

    // speed-up countdown
    if (state.speedUpFrames > 0) {
      state.speedUpFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#ffee00,#ff8800)';
        bar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.7';
        bar.textContent = `⚡ 加速針 ${Math.ceil(state.speedUpFrames / 60)}s`;
      }
    } else if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }
    if (state.hourglassFrames > 0) {
      state.hourglassFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0 && state.speedUpFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#d7b7ff,#ffffff)';
        bar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.75';
        bar.textContent = `⏳ 時間 +3 秒`;
      }
    } else if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0 && state.speedUpFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }
    if (state.rainbowFrames > 0) {
      state.rainbowFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0 && state.speedUpFrames <= 0 && state.hourglassFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#ff3366,#ffcc00,#33ff77,#33aaff,#cc66ff)';
        bar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.78';
        bar.textContent = '🌈 彩虹爆破!';
      }
    } else if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0 && state.speedUpFrames <= 0 && state.hourglassFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }
    if (state.chainFrames > 0) {
      state.chainFrames--;
      const bar = document.getElementById('freezeBar');
      if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0 && state.speedUpFrames <= 0 && state.hourglassFrames <= 0 && state.rainbowFrames <= 0) {
        bar.style.display = 'block';
        bar.style.background = 'linear-gradient(90deg,#8affff,#ffffff,#7b61ff)';
        bar.style.opacity = (state.frame % 18 < 9) ? '1' : '0.76';
        bar.textContent = '🔗 連鎖閃電!';
      }
    } else if (state.freezeFrames <= 0 && state.multiShotFrames <= 0 && state.magnetFrames <= 0 && state.shieldFrames <= 0 && state.speedUpFrames <= 0 && state.hourglassFrames <= 0 && state.rainbowFrames <= 0) {
      document.getElementById('freezeBar').style.display = 'none';
    }

    // balloons
    for (const b of state.balloons) {
      if (!b.alive) continue;
      b.phase += b.swingSpeed;
      if (state.magnetFrames > 0) {
        b.baseX += (state.mouse.x - b.baseX) * 0.035;
        if (state.freezeFrames <= 0) b.vy += (state.mouse.y - b.y) * 0.003;
      }
      b.x = b.baseX + Math.sin(b.phase) * b.swing;
      if (state.freezeFrames <= 0) b.y += b.vy;
    }
    state.balloons = state.balloons.filter(b => b.alive && b.y + b.r > -50);

    // items
    for (const it of state.items) {
      if (!it.alive) continue;
      it.vy += it.g;
      it.x += it.vx;
      it.y += it.vy;
      it.rot += it.vrot;
    }
    state.items = state.items.filter(it => it.alive && it.y - it.r < H + 80);

    // particles
    for (const p of state.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= 0.025;
    }
    state.particles = state.particles.filter(p => p.life > 0);
    for (const bolt of state.lightningBolts) bolt.life -= 0.08;
    state.lightningBolts = state.lightningBolts.filter(bolt => bolt.life > 0);

    // invincible BGM
    if (state.invincibleFrames > 0) {
      state.invincibleFrames--;
      state.bgmTick++;
      if (state.bgmTick % 8 === 0) {
        sfx.bgmTick((state.bgmTick / 8) % 2 === 0);
      }
      invincibleBar.style.display = 'block';
      invincibleBar.style.opacity = (state.frame % 20 < 10) ? '1' : '0.6';
    } else {
      invincibleBar.style.display = 'none';
    }

    // shake
    if (state.shakeFrames > 0) {
      state.shakeFrames--;
      const mag = Math.min(12, state.shakeFrames * 0.6);
      canvas.style.transform = `translate(${(Math.random() - 0.5) * mag}px, ${(Math.random() - 0.5) * mag}px)`;
      shakeEl.style.borderWidth = '8px';
      shakeEl.style.borderColor = 'rgba(255,0,0,0.6)';
    } else {
      canvas.style.transform = '';
      shakeEl.style.borderWidth = '0';
      shakeEl.style.borderColor = 'rgba(255,0,0,0)';
    }
  }

  function render() {
    drawBackground();
    for (const b of state.balloons) drawBalloon(b);
    for (const it of state.items) {
      if (it.type === 'gift') drawGift(it);
      else if (it.type === 'bomb') drawBomb(it);
      else if (it.type === 'star') drawStar(it);
      else if (it.type === 'freeze') drawFreeze(it);
      else if (it.type === 'multiShot') drawMultiShot(it);
      else if (it.type === 'magnet') drawMagnet(it);
      else if (it.type === 'shield') drawShield(it);
      else if (it.type === 'speedUp') drawSpeedUp(it);
      else if (it.type === 'hourglass') drawHourglass(it);
      else if (it.type === 'rainbow') drawRainbow(it);
      else if (it.type === 'chain') drawChain(it);
    }
    drawLightningBolts();
    drawParticles();
    drawCursor();
  }

  let lastTime = 0;
  function loop(t) {
    if (!state.running) return;
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ---- Timer ----
  let timerHandle = null;
  function startTimer() {
    if (timerHandle) clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      state.timeLeft--;
      updateUI();
      if (state.timeLeft <= 0) endGame();
    }, 1000);
  }

  function updateUI() {
    scoreEl.textContent = `分數: ${state.score}`;
    timerEl.textContent = state.timeLeft;
    if (state.timeLeft <= 5) timerEl.classList.add('warn');
    else timerEl.classList.remove('warn');
  }

  // ---- Start / End ----
  function startGame() {
    ensureAudio();
    document.getElementById('introScreen')?.classList.add('hidden');
    document.getElementById('clickToStart')?.classList.add('hidden');
    document.getElementById('skipBtn').style.display = 'none';
    state.score = 0;
    state.timeLeft = 20;
    state.frame = 0;
    state.balloons = [];
    state.items = [];
    state.particles = [];
    state.invincibleFrames = 0;
    state.freezeFrames = 0;
    state.multiShotFrames = 0;
    state.magnetFrames = 0;
    state.shieldFrames = 0;
    state.speedUpFrames = 0;
    state.hourglassFrames = 0;
    state.rainbowFrames = 0;
    state.chainFrames = 0;
    state.lightningBolts = [];
    state.spawnCounter = 0;
    state.shakeFrames = 0;
    state.running = true;
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    updateUI();
    startTimer();
    requestAnimationFrame(loop);
  }
  function endGame() {
    state.running = false;
    if (timerHandle) clearInterval(timerHandle);
    document.getElementById('introScreen')?.classList.add('hidden');
    document.getElementById('clickToStart')?.classList.add('hidden');
    document.getElementById('skipBtn').style.display = 'none';
    sfx.gameover();
    finalScore.textContent = `分數：${state.score}`;
    let comment;
    if (state.score >= 80) comment = '🏆 神射手！百發百中！';
    else if (state.score >= 50) comment = '🎯 厲害！準頭不錯！';
    else if (state.score >= 20) comment = '👍 還不錯，再接再厲！';
    else if (state.score >= 0) comment = '😅 多練習，下次更好！';
    else comment = '💣 炸到太多啦～';
    finalComment.textContent = comment;
    endScreen.classList.remove('hidden');
    if (window.onGameEnd) window.onGameEnd(state.score);
  }

  // ---- Input ----
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    } else if (e.changedTouches && e.changedTouches[0]) {
      return { x: e.changedTouches[0].clientX - rect.left, y: e.changedTouches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  canvas.addEventListener('mousemove', (e) => {
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y;
  });
  canvas.addEventListener('mousedown', (e) => {
    if (!state.running) return;
    ensureAudio();
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y;
    tryHit(p.x, p.y);
  });
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!state.running) return;
    ensureAudio();
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y;
    tryHit(p.x, p.y);
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const p = getPos(e);
    state.mouse.x = p.x; state.mouse.y = p.y;
  }, { passive: false });

  startBtn.addEventListener('click', () => { ensureAudio(); startGame(); });
  restartBtn.addEventListener('click', () => { ensureAudio(); startGame(); });
})();
</script>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
(function() {
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCFVDsAvTx10-eshL3RYiSzyYlPFEvqyz8",
    authDomain: "claude-code-project-3a0d3.firebaseapp.com",
    projectId: "claude-code-project-3a0d3",
    storageBucket: "claude-code-project-3a0d3.firebasestorage.app",
    messagingSenderId: "451203824543",
    appId: "1:451203824543:web:fa2e9bb8c2c0f69c339baa"
  };
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();
  const COL = 'balloon_shooter';

  let currentScore = 0;
  let submitted = false;

  const nameSection  = document.getElementById('nameInputSection');
  const lbSection    = document.getElementById('leaderboardSection');
  const lbList       = document.getElementById('leaderboardList');
  const nameInput    = document.getElementById('playerNameInput');
  const submitBtn    = document.getElementById('submitScoreBtn');
  const skipBtn      = document.getElementById('skipScoreBtn');
  const restartBtn   = document.getElementById('restartBtn');

  window.onGameEnd = function(score) {
    currentScore = score;
    submitted = false;
    submitBtn.disabled = false;
    submitBtn.textContent = '送出 🚀';
    nameInput.value = '';
    nameSection.classList.remove('hidden');
    lbSection.classList.add('hidden');
  };

  async function showLeaderboard(myName) {
    nameSection.classList.add('hidden');
    lbSection.classList.remove('hidden');
    lbList.innerHTML = '<div class="lb-msg">載入中...</div>';
    try {
      const snap = await db.collection(COL).orderBy('score', 'desc').limit(10).get();
      const rows = [];
      snap.forEach(doc => rows.push(doc.data()));
      if (!rows.length) { lbList.innerHTML = '<div class="lb-msg">還沒有紀錄，你是第一個！</div>'; return; }
      const medals = ['🥇','🥈','🥉'];
      lbList.innerHTML = rows.map((r, i) => {
        const mine = myName && r.name === myName && r.score === currentScore;
        return `<div class="lb-row${mine ? ' lb-mine' : ''}">
          <span class="lb-rank">${medals[i] || (i + 1)}</span>
          <span class="lb-name">${r.name}</span>
          <span class="lb-score">${r.score} 分</span>
        </div>`;
      }).join('');
    } catch(e) {
      lbList.innerHTML = '<div class="lb-msg">⚠️ 載入失敗，請確認網路</div>';
    }
  }

  submitBtn.addEventListener('click', async function() {
    if (submitted) return;
    const name = nameInput.value.trim() || '匿名';
    submitted = true;
    submitBtn.disabled = true;
    submitBtn.textContent = '送出中...';
    try {
      await db.collection(COL).add({
        name,
        score: currentScore,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) { console.error('送出失敗', e); }
    showLeaderboard(name);
  });

  skipBtn.addEventListener('click', () => showLeaderboard(null));

  restartBtn.addEventListener('click', function() {
    nameSection.classList.remove('hidden');
    lbSection.classList.add('hidden');
  });
})();
</script>
