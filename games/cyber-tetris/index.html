<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊 - 賽博終極版</title>
    <style>
        body {
            background: radial-gradient(circle at center, #0b1021 0%, #000000 100%);
            color: #00f3ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            touch-action: manipulation;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.1s ease-out;
            max-width: 100vw;
        }

        .shake-intense {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 2px, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(4px, -3px, 0) rotate(1deg); }
            30%, 50%, 70% { transform: translate3d(-6px, 4px, 0) rotate(-2deg); }
            40%, 60% { transform: translate3d(6px, -4px, 0) rotate(2deg); }
        }

        h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 5px #00f3ff, 0 0 15px #00f3ff, 0 0 30px #0055ff;
            letter-spacing: 4px;
            font-weight: 900;
        }

        #game-container {
            display: flex;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.6) 0%, rgba(2, 6, 23, 0.8) 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
            gap: 20px;
            transition: box-shadow 0.3s ease;
        }

        #canvas-wrapper {
            position: relative;
            display: flex;
        }

        .danger-vignette {
            box-shadow: 0 0 50px rgba(255, 0, 60, 0.6), inset 0 0 40px rgba(255, 0, 60, 0.4) !important;
            border-color: rgba(255, 0, 60, 0.8) !important;
            animation: pulse-danger 1s infinite alternate;
        }
        @keyframes pulse-danger {
            0% { box-shadow: 0 0 30px rgba(255, 0, 60, 0.4), inset 0 0 20px rgba(255, 0, 60, 0.2); }
            100% { box-shadow: 0 0 60px rgba(255, 0, 60, 0.8), inset 0 0 50px rgba(255, 0, 60, 0.5); }
        }

        #tetris {
            background-color: rgba(0, 5, 15, 0.95);
            border: 2px solid #00f3ff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3), inset 0 0 40px rgba(0, 243, 255, 0.1);
        }

        #sidebar {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 150px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 85, 255, 0.5);
            box-shadow: inset 0 0 15px rgba(0, 85, 255, 0.2);
            text-align: center;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .info-box::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to bottom, transparent, rgba(0, 243, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: scanline 4s linear infinite;
        }
        @keyframes scanline {
            0% { transform: translateY(-100%) rotate(45deg); }
            100% { transform: translateY(100%) rotate(45deg); }
        }

        .info-box span {
            display: block;
            font-size: 0.75rem;
            color: #8ab4f8;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .info-box strong {
            display: block;
            font-size: 1.6rem;
            color: #fff;
            text-shadow: 0 0 10px #00f3ff;
        }

        #next-piece-canvas {
            background-color: transparent;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }

        .btn {
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.1) 0%, rgba(0, 85, 255, 0.2) 100%);
            color: #fff;
            border: 1px solid #00f3ff;
            padding: 12px 15px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 10px;
            width: 100%;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 25px #00f3ff, 0 0 50px rgba(0, 243, 255, 0.5);
            text-shadow: none;
            transform: translateY(-2px);
        }

        .btn-restart {
            background: rgba(255, 0, 60, 0.1);
            border-color: #ff003c;
            color: #ffaa00;
            text-shadow: 0 0 5px #ff003c;
            font-size: 0.85rem;
            padding: 8px 10px;
        }
        .btn-restart:hover {
            background: #ff003c;
            color: #fff;
            box-shadow: 0 0 20px #ff003c;
        }

        .btn-home {
            border-color: #00ffa3;
            background: rgba(0, 255, 163, 0.09);
            color: #d8fff2;
            text-shadow: 0 0 5px #00ffa3;
        }
        .btn-home:hover {
            background: #00ffa3;
            color: #00130d;
            box-shadow: 0 0 20px #00ffa3;
        }

        #leaderboard-panel {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border: 1px solid rgba(0, 243, 255, 0.32);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.46);
            box-shadow: inset 0 0 16px rgba(0, 243, 255, 0.08);
            box-sizing: border-box;
        }
        #leaderboard-panel h3 {
            margin: 0 0 8px;
            font-size: 0.78rem;
            letter-spacing: 1px;
            color: #fff;
        }
        #score-submit {
            display: grid;
            gap: 8px;
            margin-bottom: 10px;
        }
        #player-name {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(0, 243, 255, 0.4);
            border-radius: 6px;
            padding: 8px;
            background: rgba(0, 5, 15, 0.88);
            color: #fff;
            outline: none;
        }
        #leaderboard-list {
            display: grid;
            gap: 6px;
            max-height: 170px;
            overflow: auto;
        }
        .lb-row {
            display: grid;
            grid-template-columns: 22px 1fr auto;
            gap: 6px;
            align-items: center;
            padding: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.78rem;
            text-transform: none;
        }
        .lb-row.mine {
            background: rgba(0, 243, 255, 0.16);
            box-shadow: inset 0 0 0 1px rgba(0, 243, 255, 0.35);
        }
        .lb-rank { color: #8ab4f8; }
        .lb-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #fff;
        }
        .lb-score {
            color: #00f3ff;
            font-weight: 800;
            white-space: nowrap;
        }
        .lb-meta {
            grid-column: 2 / 4;
            color: #8ab4f8;
            font-size: 0.68rem;
        }
        .lb-state {
            color: #8ab4f8;
            font-size: 0.76rem;
            line-height: 1.45;
            text-transform: none;
        }

        #controls {
            display: none;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(2, 64px);
            gap: 10px;
            justify-content: center;
            margin-top: 5px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .control-btn {
            background: rgba(0, 243, 255, 0.05);
            color: #00f3ff;
            border: 1px solid rgba(0, 243, 255, 0.5);
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .control-btn:active {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 20px #00f3ff;
        }

        .control-btn.pressed {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 20px #00f3ff;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 820px), (hover: none) and (pointer: coarse) {
            body {
                align-items: flex-start;
                min-height: 100dvh;
                height: 100dvh;
                overflow: hidden;
            }
            h1 {
                font-size: 1.35rem;
                letter-spacing: 2px;
            }
            #game-wrapper {
                width: 100vw;
                height: 100dvh;
                gap: 6px;
                padding: 8px 8px 214px;
                box-sizing: border-box;
            }
            #game-container {
                flex-direction: column;
                align-items: center;
                padding: 8px;
                gap: 8px;
                width: min(100%, 360px);
                box-sizing: border-box;
            }
            #canvas-wrapper { width: min(100%, 288px); }
            #sidebar {
                flex-direction: row;
                width: 100%;
                flex-wrap: wrap;
                gap: 10px;
            }
            .info-box { margin-bottom: 0; flex: 1; padding: 5px; }
            #next-piece-canvas { display: none; }
            .info-box:first-child { display: none; }
            #controls {
                position: fixed;
                left: 50%;
                bottom: max(12px, env(safe-area-inset-bottom));
                z-index: 30;
                display: grid;
                padding: 14px;
                border: 1px solid rgba(0,243,255,0.35);
                border-radius: 18px;
                background: rgba(0, 5, 15, 0.82);
                box-shadow: 0 0 28px rgba(0,243,255,0.2);
                backdrop-filter: blur(12px);
                transform: translateX(-50%);
            }
            #tetris { width: 288px; height: 480px; }
            #leaderboard-panel { display: none; }
            #overlay-title { font-size: 2rem; }
            #overlay-btn { font-size: 1rem !important; padding: 13px 28px !important; }
        }

        @media (max-height: 760px) and (max-width: 820px) {
            #tetris { width: 240px; height: 400px; }
            #canvas-wrapper { width: 240px; }
            #controls {
                grid-template-columns: repeat(3, 58px);
                grid-template-rows: repeat(2, 58px);
            }
        }

        #overlay-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 5, 15, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        #overlay-title {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #00f3ff, 0 0 30px #0055ff;
            font-weight: 900;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <h1>CYBER TETRIS</h1>
    <p style="margin:-8px 0 0;color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:2px">Release v1.0.8</p>

    <div id="game-container">
        <div id="canvas-wrapper">
            <canvas id="tetris" width="360" height="600"></canvas>

            <div id="overlay-screen">
                <h2 id="overlay-title">系統待機</h2>
                <p id="overlay-desc" style="color: #8ab4f8; margin-bottom: 20px;">等待使用者輸入...</p>
                <button id="overlay-btn" class="btn" style="width: auto; padding: 15px 40px; font-size: 1.2rem;">啟動 START</button>
            </div>
        </div>

        <div id="sidebar">
            <div>
                <div class="info-box">
                    <span>NEXT</span>
                    <canvas id="next-piece-canvas" width="100" height="100"></canvas>
                </div>
                <div class="info-box">
                    <span>SCORE</span>
                    <strong id="score">0</strong>
                </div>
                <div class="info-box">
                    <span>LEVEL</span>
                    <strong id="level">1</strong>
                    <span style="margin-top:8px">CORE / SHIELD</span>
                    <strong id="core-status" style="font-size:0.95rem">READY</strong>
                </div>
            </div>
            <div>
                <button id="pause-btn" class="btn">開始遊戲</button>
                <button id="restart-btn" class="btn btn-restart">重新系統</button>
                <button id="home-btn" class="btn btn-home" type="button" onclick="window.location.href='../../index.html'">回主畫面</button>
                <div id="leaderboard-panel">
                    <h3>排行榜 TOP 10</h3>
                    <div id="score-submit" class="hidden">
                        <input id="player-name" maxlength="20" placeholder="輸入名字 / 座號">
                        <button id="submit-score-btn" class="btn" type="button">送出分數</button>
                    </div>
                    <div id="leaderboard-list"><div class="lb-state">載入排行榜中...</div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-up" class="control-btn">↻</button>
        <button id="btn-left" class="control-btn">←</button>
        <button id="btn-down" class="control-btn">↓</button>
        <button id="btn-right" class="control-btn">→</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-piece-canvas');
    const nextContext = nextCanvas.getContext('2d');

    context.scale(30, 30);
    nextContext.scale(25, 25);

    const colors = [
        null,
        '#00f3ff',
        '#ff003c',
        '#e6ff00',
        '#0055ff',
        '#b700ff',
        '#00ffa3',
        '#ff7000',
        '#ff0000',
        '#ffffff',
        '#444444',
        '#ff00ff',
        '#ffee00',
        '#8affff',
        '#ff9f1c',
        '#55ff88'
    ];

    const standardPieces = {
        'T': [[0,0,0], [1,1,1], [0,1,0]],
        'O': [[2,2], [2,2]],
        'L': [[0,3,0], [0,3,0], [0,3,3]],
        'J': [[0,4,0], [0,4,0], [4,4,0]],
        'I': [[0,5,0,0], [0,5,0,0], [0,5,0,0], [0,5,0,0]],
        'S': [[0,6,6], [6,6,0], [0,0,0]],
        'Z': [[7,7,0], [0,7,7], [0,0,0]]
    };

    let particles = [];
    let lasers = [];
    let drillBeams = [];

    function createParticles(x, y, colorStr, amount = 10) {
        for(let i=0; i<amount; i++) {
            particles.push({
                x: x + 0.5, y: y + 0.5,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4 - 0.2,
                life: 1.0,
                color: colorStr
            });
        }
    }

    function updateAndDrawEffects() {
        lasers.forEach((laser, index) => {
            laser.life -= 0.05;
            if(laser.life <= 0) { lasers.splice(index, 1); return; }
            context.fillStyle = `rgba(0, 243, 255, ${laser.life})`;
            context.fillRect(0, laser.y + 0.5 - laser.life/2, 12, laser.life);
            context.fillStyle = `rgba(255, 255, 255, ${laser.life})`;
            context.fillRect(0, laser.y + 0.4, 12, 0.2);
        });
        drillBeams.forEach((beam, index) => {
            beam.life -= 0.045;
            if(beam.life <= 0) { drillBeams.splice(index, 1); return; }
            context.fillStyle = `rgba(255, 159, 28, ${beam.life * 0.8})`;
            context.fillRect(beam.x + 0.5 - beam.life/2, 0, beam.life, 20);
            context.fillStyle = `rgba(255, 255, 255, ${beam.life})`;
            context.fillRect(beam.x + 0.4, 0, 0.2, 20);
        });

        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.02;
            p.life -= 0.03;
            if(p.life <= 0) { particles.splice(index, 1); return; }
            context.fillStyle = p.color;
            context.globalAlpha = p.life;
            context.fillRect(p.x, p.y, 0.15, 0.15);
            context.globalAlpha = 1.0;
        });
    }

    function drawBlock(x, y, value, ctx, isGhost = false) {
        if (value === 0) return;

        let color = colors[value];
        if (value === 11) color = colors[Math.floor(Math.random() * 7) + 1];

        const alpha = isGhost ? 0.2 : 1.0;
        ctx.globalAlpha = alpha;

        ctx.fillStyle = 'rgba(0, 10, 25, 0.8)';
        ctx.fillRect(x + 0.05, y + 0.05, 0.9, 0.9);

        ctx.strokeStyle = color;
        ctx.lineWidth = 0.08;
        ctx.strokeRect(x + 0.1, y + 0.1, 0.8, 0.8);

        if (value === 8) {
            ctx.fillStyle = Math.random() > 0.5 ? '#ff003c' : '#ffffff';
            ctx.fillRect(x + 0.3, y + 0.3, 0.4, 0.4);
        } else if (value === 9) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 0.35, y + 0.35, 0.3, 0.3);
            ctx.strokeStyle = '#00f3ff';
            ctx.strokeRect(x + 0.25, y + 0.25, 0.5, 0.5);
        } else if (value === 10) {
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 0.15, y + 0.15, 0.7, 0.7);
            ctx.fillStyle = '#b700ff';
            ctx.fillRect(x + 0.35, y + 0.35, 0.3, 0.3);
        } else if (value === 12) {
            ctx.fillStyle = '#ffee00';
            ctx.fillRect(x + 0.12, y + 0.42, 0.76, 0.16);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(x + 0.28, y + 0.28, 0.44, 0.44);
        } else if (value === 13) {
            ctx.fillStyle = 'rgba(138,255,255,0.55)';
            ctx.beginPath();
            ctx.arc(x + 0.5, y + 0.5, 0.32, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 0.04;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y + 0.22); ctx.lineTo(x + 0.5, y + 0.78);
            ctx.moveTo(x + 0.22, y + 0.5); ctx.lineTo(x + 0.78, y + 0.5);
            ctx.stroke();
        } else if (value === 14) {
            ctx.fillStyle = '#ff9f1c';
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y + 0.16);
            ctx.lineTo(x + 0.82, y + 0.74);
            ctx.lineTo(x + 0.18, y + 0.74);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 0.04;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y + 0.22);
            ctx.lineTo(x + 0.5, y + 0.72);
            ctx.moveTo(x + 0.32, y + 0.48);
            ctx.lineTo(x + 0.68, y + 0.48);
            ctx.stroke();
        } else if (value === 15) {
            ctx.fillStyle = 'rgba(85,255,136,0.4)';
            ctx.beginPath();
            ctx.arc(x + 0.5, y + 0.5, 0.34, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 0.05;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y + 0.18);
            ctx.quadraticCurveTo(x + 0.82, y + 0.3, x + 0.5, y + 0.82);
            ctx.quadraticCurveTo(x + 0.18, y + 0.3, x + 0.5, y + 0.18);
            ctx.stroke();
        } else {
            ctx.fillStyle = color;
            ctx.globalAlpha = isGhost ? 0.1 : 0.4;
            ctx.fillRect(x + 0.2, y + 0.2, 0.6, 0.6);
        }

        ctx.globalAlpha = 1.0;
    }

    function drawMatrix(matrix, offset, ctx, isGhost = false) {
        if (!matrix) return;
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                drawBlock(x + offset.x, y + offset.y, value, ctx, isGhost);
            });
        });
    }

    const arena = [];
    while (arena.length < 20) arena.push(new Array(12).fill(0));

    function generatePiece() {
        if (Math.random() < 0.13) {
            const rand = Math.random();
            if (rand < 0.17) return { matrix: [[8]], type: 'bomb' };
            if (rand < 0.34) return { matrix: [[9]], type: 'nano' };
            if (rand < 0.51) return { matrix: [[10,10],[10,10]], type: 'heavy' };
            if (rand < 0.68) return { matrix: [[12,12,12,12]], type: 'laser' };
            if (rand < 0.82) return { matrix: [[13]], type: 'timecore' };
            if (rand < 0.91) return { matrix: [[14],[14],[14]], type: 'drill' };
            if (rand < 0.98) return { matrix: [[15,15],[0,15]], type: 'shield' };

            let normal = generateNormalMatrix();
            let quantumMatrix = normal.map(row => row.map(v => v !== 0 ? 11 : 0));
            return { matrix: quantumMatrix, type: 'quantum' };
        }
        return { matrix: generateNormalMatrix(), type: 'normal' };
    }

    function generateNormalMatrix() {
        const pieceNames = 'TJLOSZI';
        const name = pieceNames[Math.floor(Math.random() * pieceNames.length)];
        return standardPieces[name].map(row => [...row]);
    }

    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        nextObj: null,
        specialType: 'normal',
        score: 0, lines: 0, level: 1, shields: 0,
        trail: []
    };

    function collide(board, p) {
        const m = p.matrix;
        const o = p.pos;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function triggerScreenShake() {
        const wrapper = document.getElementById('game-wrapper');
        wrapper.classList.remove('shake-intense');
        void wrapper.offsetWidth;
        wrapper.classList.add('shake-intense');
    }

    function merge(board, p) {
        let isBomb = false;
        let isTimeCore = false;
        let shieldBlocks = 0;
        const laserRows = new Set();
        const drillCols = new Set();
        p.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    let by = y + p.pos.y;
                    let bx = x + p.pos.x;
                    if (by >= 0 && by < 20 && bx >= 0 && bx < 12) {
                        board[by][bx] = value;
                        if (value === 8) isBomb = true;
                        if (value === 11) board[by][bx] = Math.floor(Math.random() * 7) + 1;
                        if (value === 12) laserRows.add(by);
                        if (value === 13) isTimeCore = true;
                        if (value === 14) drillCols.add(bx);
                        if (value === 15) shieldBlocks++;
                    }
                }
            });
        });

        if (isBomb) {
            triggerScreenShake();
            const cx = p.pos.x;
            const cy = p.pos.y;
            for(let dy = -2; dy <= 2; dy++) {
                for(let dx = -2; dx <= 2; dx++) {
                    let by = cy + dy, bx = cx + dx;
                    if(by >= 0 && by < 20 && bx >= 0 && bx < 12) {
                        if (board[by][bx] !== 0) {
                            createParticles(bx, by, colors[board[by][bx] > 7 ? 2 : board[by][bx]], 5);
                            board[by][bx] = 0;
                        }
                    }
                }
            }
        }
        laserRows.forEach(row => {
            if (row < 0 || row >= board.length) return;
            for (let x = 0; x < board[row].length; x++) {
                if (board[row][x] !== 0) createParticles(x, row, '#ffee00', 6);
                board[row][x] = 0;
            }
            lasers.push({y: row, life: 1.2});
            player.score += 150;
        });
        drillCols.forEach(col => {
            if (col < 0 || col >= board[0].length) return;
            for (let y = 0; y < board.length; y++) {
                if (board[y][col] !== 0) createParticles(col, y, '#ff9f1c', 7);
                board[y][col] = 0;
            }
            drillBeams.push({x: col, life: 1.3});
            player.score += 180;
            triggerScreenShake();
        });
        if (isTimeCore) {
            slowMoTimer = 8000;
            player.score += 120;
            lasers.push({y: Math.max(0, Math.min(19, p.pos.y)), life: 0.7});
            triggerScreenShake();
        }
        if (shieldBlocks > 0) {
            player.shields = Math.min(3, player.shields + 1);
            player.score += 120;
            lasers.push({y: Math.max(0, Math.min(19, p.pos.y + 1)), life: 0.55});
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function arenaSweep() {
        let rowCount = 1;
        let linesCleared = 0;

        outer: for (let y = arena.length - 1; y >= 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }

            for (let x = 0; x < arena[y].length; ++x) {
                createParticles(x, y, colors[arena[y][x]], 8);
            }

            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;

            player.score += rowCount * 100;
            rowCount *= 2;
            linesCleared++;
        }

        if (linesCleared > 0) {
            player.lines += linesCleared;
            player.level = Math.floor(player.lines / 5) + 1;
            updateScore();

            if (linesCleared >= 4) {
                lasers.push({y: 19, life: 1.0});
                triggerScreenShake();
            }
        }
    }

    function playerReset() {
        if (!player.nextObj) player.nextObj = generatePiece();

        player.matrix = player.nextObj.matrix;
        player.specialType = player.nextObj.type;
        player.nextObj = generatePiece();

        player.pos.y = 0;
        player.pos.x = (Math.floor(arena[0].length / 2)) - (Math.floor(player.matrix[0].length / 2));
        player.trail = [];

        drawNextPiece();

        if (collide(arena, player)) {
            if (player.shields > 0) {
                player.shields--;
                for (let y = 0; y < 4; y++) {
                    for (let x = 0; x < arena[y].length; x++) {
                        if (arena[y][x] !== 0) createParticles(x, y, '#55ff88', 8);
                        arena[y][x] = 0;
                    }
                }
                player.score += 250;
                triggerScreenShake();
                updateScore();
            } else {
                gameState = 'GAMEOVER';
                showOverlay('SYSTEM FAILURE', `最終分數: ${player.score}`);
                if (window.onCyberTetrisEnd) window.onCyberTetrisEnd(player.score, player.lines, player.level);
            }
        }
    }

    function getGhostPos() {
        const ghost = { matrix: player.matrix, pos: { x: player.pos.x, y: player.pos.y } };
        while (!collide(arena, ghost)) { ghost.pos.y++; }
        ghost.pos.y--;
        return ghost.pos;
    }

    function playerDrop() {
        player.pos.y++;
        player.trail.push({x: player.pos.x, y: player.pos.y, alpha: 0.3});
        if(player.trail.length > 4) player.trail.shift();

        if (collide(arena, player)) {
            let actualHeight = 0;
            for (let y = 0; y < player.matrix.length; y++) {
                if (player.matrix[y].some(v => v !== 0)) actualHeight = y + 1;
            }
            let hitFloor = (player.pos.y + actualHeight > arena.length);

            if (player.specialType === 'heavy' && !hitFloor) {
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            let by = y + player.pos.y;
                            let bx = x + player.pos.x;
                            if (by >= 0 && by < 20 && bx >= 0 && bx < 12 && arena[by][bx] !== 0) {
                                createParticles(bx, by, '#444', 5);
                                arena[by][bx] = 0;
                                player.score += 20;
                            }
                        }
                    });
                });
                triggerScreenShake();
            } else {
                player.pos.y--;
                merge(arena, player);
                arenaSweep();
                playerReset();
            }
        }
        dropCounter = 0;
    }

    function playerHardDrop() {
        while (!collide(arena, player)) { player.pos.y++; }

        if (player.specialType !== 'heavy') {
            player.pos.y--;
        } else {
            player.pos.y--;

            let actualHeight = 0;
            for (let y = 0; y < player.matrix.length; y++) {
                if (player.matrix[y].some(v => v !== 0)) actualHeight = y + 1;
            }
            while(player.pos.y < 20 - actualHeight) {
                 player.pos.y++;
                 player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        let by = y + player.pos.y;
                        let bx = x + player.pos.x;
                        if(value !== 0 && by >= 0 && by < 20 && bx >= 0 && bx < 12 && arena[by][bx] !== 0) {
                            arena[by][bx] = 0;
                            createParticles(bx, by, '#444', 3);
                        }
                    });
                 });
            }
        }

        merge(arena, player);
        triggerScreenShake();
        arenaSweep();
        playerReset();
        dropCounter = 0;
    }

    function playerMove(offset) {
        player.pos.x += offset;
        if (collide(arena, player)) player.pos.x -= offset;
    }

    function playerRotate(dir) {
        if(player.matrix.length === 1) return;

        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function draw() {
        context.fillStyle = '#00040a';
        context.fillRect(0, 0, canvas.width, canvas.height);

        context.fillStyle = 'rgba(0, 243, 255, 0.03)';
        for(let i=0; i<12; i++) {
            for(let j=0; j<20; j++) {
                context.fillRect(i + 0.05, j + 0.05, 0.9, 0.9);
            }
        }

        drawMatrix(arena, {x: 0, y: 0}, context);

        if (player.matrix && gameState === 'PLAYING') {
            const ghostPos = getGhostPos();
            drawMatrix(player.matrix, ghostPos, context, true);

            player.trail.forEach(t => {
                t.alpha -= 0.05;
                if(t.alpha > 0) {
                    context.globalAlpha = t.alpha;
                    drawMatrix(player.matrix, t, context, true);
                }
            });
            context.globalAlpha = 1.0;

            drawMatrix(player.matrix, player.pos, context);
        }

        updateAndDrawEffects();
    }

    function drawNextPiece() {
        nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (player.nextObj) {
            const m = player.nextObj.matrix;
            const offsetX = (4 - m[0].length) / 2;
            const offsetY = (4 - m.length) / 2;
            drawMatrix(m, {x: offsetX, y: offsetY}, nextContext);
        }
    }

    function updateScore() {
        document.getElementById('score').innerText = player.score;
        document.getElementById('level').innerText = player.level;
        const coreStatus = document.getElementById('core-status');
        if (coreStatus && slowMoTimer <= 0) {
            coreStatus.innerText = player.shields > 0 ? `SHIELD x${player.shields}` : 'READY';
            coreStatus.style.color = player.shields > 0 ? '#55ff88' : '#fff';
            coreStatus.style.textShadow = player.shields > 0 ? '0 0 12px #55ff88' : '';
        }
    }

    let dropCounter = 0;
    let quantumTimer = 0;
    let slowMoTimer = 0;
    let lastTime = 0;
    let gameState = 'START';
    let reqId;

    function update(time = 0) {
        if (gameState !== 'PLAYING') return;

        const deltaTime = time - lastTime;
        lastTime = time;

        const isDanger = arena[0].some(x=>x) || arena[1].some(x=>x) || arena[2].some(x=>x);
        const container = document.getElementById('game-container');
        if (isDanger) container.classList.add('danger-vignette');
        else container.classList.remove('danger-vignette');

        let currentDropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
        if (isDanger && player.pos.y < 4) currentDropInterval *= 1.5;
        if (slowMoTimer > 0) {
            slowMoTimer = Math.max(0, slowMoTimer - deltaTime);
            currentDropInterval *= 1.7;
        }
        const coreStatus = document.getElementById('core-status');
        if (coreStatus) {
            coreStatus.innerText = slowMoTimer > 0 ? `${Math.ceil(slowMoTimer / 1000)}s` : (player.shields > 0 ? `SHIELD x${player.shields}` : 'READY');
            coreStatus.style.color = slowMoTimer > 0 ? '#8affff' : (player.shields > 0 ? '#55ff88' : '#fff');
            coreStatus.style.textShadow = slowMoTimer > 0 ? '0 0 12px #8affff' : (player.shields > 0 ? '0 0 12px #55ff88' : '');
        }

        dropCounter += deltaTime;
        if (dropCounter > currentDropInterval) {
            playerDrop();
        }

        if (player.specialType === 'quantum') {
            quantumTimer += deltaTime;
            if (quantumTimer > 300) {
                quantumTimer = 0;
                let newMatrix = generateNormalMatrix().map(row => row.map(v => v !== 0 ? 11 : 0));
                let oldMatrix = player.matrix;
                player.matrix = newMatrix;
                if (collide(arena, player)) player.matrix = oldMatrix;
            }
        }

        draw();
        reqId = requestAnimationFrame(update);
    }

    function showOverlay(title, desc = '') {
        const overlay = document.getElementById('overlay-screen');
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-desc').innerText = desc;

        const overlayBtn = document.getElementById('overlay-btn');
        if (gameState === 'GAMEOVER') {
            overlayBtn.innerText = '重新啟動 RESTART';
        } else if (gameState === 'PAUSED') {
            overlayBtn.innerText = '繼續 RESUME';
        } else {
            overlayBtn.innerText = '啟動 START';
        }

        overlay.classList.remove('hidden');
    }

    function hideOverlay() {
        document.getElementById('overlay-screen').classList.add('hidden');
    }

    const pauseBtn = document.getElementById('pause-btn');
    const restartBtn = document.getElementById('restart-btn');

    function togglePause() {
        if (gameState === 'START' || gameState === 'GAMEOVER') {
            arena.forEach(row => row.fill(0));
            player.score = 0; player.lines = 0; player.level = 1; player.shields = 0;
            player.nextObj = null; particles = []; lasers = []; drillBeams = []; slowMoTimer = 0;
            playerReset();
            updateScore();
            gameState = 'PLAYING';
            hideOverlay();
            if (window.onCyberTetrisStart) window.onCyberTetrisStart();
            pauseBtn.innerText = '暫停';
            lastTime = performance.now();
            update();
        } else if (gameState === 'PLAYING') {
            gameState = 'PAUSED';
            pauseBtn.innerText = '繼續';
            showOverlay('系統暫停', 'PAUSED');
            cancelAnimationFrame(reqId);
        } else if (gameState === 'PAUSED') {
            gameState = 'PLAYING';
            pauseBtn.innerText = '暫停';
            hideOverlay();
            lastTime = performance.now();
            update();
        }
        pauseBtn.blur();
    }

    function forceRestart() {
        gameState = 'START';
        togglePause();
        restartBtn.blur();
    }

    pauseBtn.addEventListener('click', togglePause);
    restartBtn.addEventListener('click', forceRestart);
    document.getElementById('overlay-btn').addEventListener('click', togglePause);

    document.addEventListener('keydown', event => {
        if (gameState !== 'PLAYING') return;
        switch(event.keyCode) {
            case 37: playerMove(-1); break;
            case 39: playerMove(1); break;
            case 40: playerDrop(); break;
            case 38: playerRotate(1); break;
            case 32: playerHardDrop(); break;
            case 27: togglePause(); break;
        }
    });

    const bindTouch = (id, action, repeat = false) => {
        const el = document.getElementById(id);
        let holdTimer = null;
        let repeatTimer = null;
        const clearTimers = () => {
            clearTimeout(holdTimer);
            clearInterval(repeatTimer);
            holdTimer = null;
            repeatTimer = null;
        };
        const run = e => {
            e.preventDefault();
            el.classList.add('pressed');
            if (gameState !== 'PLAYING') return;
            action();
            if (repeat) {
                clearTimers();
                holdTimer = setTimeout(() => {
                    repeatTimer = setInterval(() => {
                        if (gameState === 'PLAYING') action();
                    }, 95);
                }, 220);
            }
        };
        const stop = e => {
            if (e) e.preventDefault();
            el.classList.remove('pressed');
            clearTimers();
        };
        el.addEventListener('pointerdown', run);
        el.addEventListener('pointerup', stop);
        el.addEventListener('pointercancel', stop);
        el.addEventListener('pointerleave', stop);
        el.addEventListener('contextmenu', e => e.preventDefault());
    };
    bindTouch('btn-left', () => playerMove(-1), true);
    bindTouch('btn-right', () => playerMove(1), true);
    bindTouch('btn-down', () => playerDrop(), true);
    bindTouch('btn-up', () => playerRotate(1));

    draw();
</script>

<script>
    (function() {
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyCFVDsAvTx10-eshL3RYiSzyYlPFEvqyz8",
            authDomain: "claude-code-project-3a0d3.firebaseapp.com",
            projectId: "claude-code-project-3a0d3",
            storageBucket: "claude-code-project-3a0d3.firebasestorage.app",
            messagingSenderId: "451203824543",
            appId: "1:451203824543:web:fa2e9bb8c2c0f69c339baa"
        };

        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        const db = firebase.firestore();
        const COL = 'cyber_tetris';
        let currentScore = 0;
        let currentLines = 0;
        let currentLevel = 1;
        let myName = '';

        const submitBox = document.getElementById('score-submit');
        const nameInput = document.getElementById('player-name');
        const submitBtn = document.getElementById('submit-score-btn');
        const listEl = document.getElementById('leaderboard-list');

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        async function loadLeaderboard() {
            listEl.innerHTML = '<div class="lb-state">載入排行榜中...</div>';
            try {
                const snap = await db.collection(COL).orderBy('score', 'desc').limit(10).get();
                const rows = [];
                snap.forEach(doc => rows.push(doc.data()));
                if (!rows.length) {
                    listEl.innerHTML = '<div class="lb-state">還沒有紀錄，第一名等你來拿。</div>';
                    return;
                }
                listEl.innerHTML = rows.map((row, index) => {
                    const mine = myName && row.name === myName && row.score === currentScore;
                    const lines = Number(row.lines || 0);
                    const level = Number(row.level || 1);
                    return `
                        <div class="lb-row ${mine ? 'mine' : ''}">
                            <span class="lb-rank">${index + 1}</span>
                            <span class="lb-name">${escapeHtml(row.name || '匿名玩家')}</span>
                            <span class="lb-score">${Number(row.score || 0).toLocaleString('zh-TW')}</span>
                            <span class="lb-meta">消除 ${lines} 行 · LV ${level}</span>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Failed to load cyber_tetris leaderboard', error);
                listEl.innerHTML = '<div class="lb-state">排行榜讀取失敗，請稍後再試。</div>';
            }
        }

        window.onCyberTetrisStart = function() {
            submitBox.classList.add('hidden');
            myName = '';
        };

        window.onCyberTetrisEnd = function(score, lines, level) {
            currentScore = Number(score || 0);
            currentLines = Number(lines || 0);
            currentLevel = Number(level || 1);
            submitBtn.disabled = false;
            submitBtn.textContent = '送出分數';
            submitBox.classList.remove('hidden');
            nameInput.focus();
            loadLeaderboard();
        };

        submitBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.focus();
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '送出中...';
            try {
                myName = name;
                await db.collection(COL).add({
                    name,
                    score: currentScore,
                    lines: currentLines,
                    level: currentLevel,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                submitBox.classList.add('hidden');
                await loadLeaderboard();
            } catch (error) {
                console.error('Failed to submit cyber_tetris score', error);
                submitBtn.disabled = false;
                submitBtn.textContent = '重試送出';
            }
        });

        loadLeaderboard();
    })();
</script>
