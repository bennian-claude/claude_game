<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級小遊戲 — Game Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ember: #ffb000;
      --signal: #00f5ff;
      --venom: #55ff88;
      --flare: #ff2d78;
      --violet: #8f66ff;
      --paper: #f4f7fb;
      --muted: rgba(244,247,251,0.66);
      --line: rgba(244,247,251,0.14);
      --bg-dark: #07080d;
    }

    html { width: 100%; max-width: 100%; background: var(--bg-dark); }

    body {
      width: 100%;
      max-width: 100%;
      font-family: "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,176,0,0.14), transparent 28rem),
        radial-gradient(circle at 82% 6%, rgba(0,245,255,0.12), transparent 26rem),
        radial-gradient(circle at 58% 88%, rgba(85,255,136,0.08), transparent 30rem),
        linear-gradient(140deg, #07080d 0%, #101216 46%, #06090d 100%);
      color: #e8eaf6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* starfield */
    #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* grid lines */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 82%);
      z-index: 1; pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed; inset: 0;
      background:
        linear-gradient(115deg, transparent 0 18%, rgba(255,255,255,0.045) 18.2%, transparent 18.7% 100%),
        radial-gradient(circle at center, transparent 0, rgba(0,0,0,0.48) 75%);
      z-index: 1; pointer-events: none;
    }

    .page {
      position: relative; z-index: 2;
      width: 100%;
      overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
      padding: 1.25rem 1.25rem 4.5rem;
    }

    .topbar {
      width: 100%;
      max-width: 1120px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem;
      padding: 0.8rem 0;
    }

    .brand {
      display: flex; align-items: center; gap: 0.75rem;
      font-family: "Orbitron", monospace;
      color: var(--paper);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .brand-mark {
      width: 2.2rem; height: 2.2rem;
      display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,176,0,0.28), rgba(0,245,255,0.16));
      box-shadow: 0 0 24px rgba(255,176,0,0.18);
    }

    .music-toggle {
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: var(--paper);
      cursor: pointer;
      padding: 0.75rem 0.95rem;
      font: 900 0.72rem "Orbitron", monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 34px rgba(0,0,0,0.24);
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
    }

    .music-toggle:hover {
      transform: translateY(-2px);
      border-color: rgba(0,245,255,0.55);
      background: rgba(0,245,255,0.12);
    }

    .music-toggle.is-on {
      color: #06100b;
      border-color: transparent;
      background: linear-gradient(135deg, var(--ember), var(--venom));
    }

    .entry-gate {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(circle at 50% 35%, rgba(0,245,255,0.14), transparent 22rem),
        rgba(3,5,9,0.88);
      backdrop-filter: blur(18px);
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .entry-gate.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .entry-card {
      width: min(460px, 100%);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.035));
      box-shadow: 0 30px 90px rgba(0,0,0,0.48);
      padding: 2rem;
      text-align: center;
    }

    .entry-card strong {
      display: block;
      font-family: "Orbitron", monospace;
      font-size: 1.35rem;
      color: var(--paper);
      letter-spacing: 0;
      margin-bottom: 0.8rem;
    }

    .entry-card p {
      color: var(--muted);
      line-height: 1.8;
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    .entry-card button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--ember), var(--signal));
      color: #06100b;
      cursor: pointer;
      padding: 0.9rem 1rem;
      font: 900 0.82rem "Orbitron", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .intro-video-screen {
      position: fixed;
      inset: 0;
      z-index: 29;
      display: none;
      background: #000;
    }

    .intro-video-screen.is-active {
      display: block;
    }

    .intro-video-screen video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .intro-skip {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 2;
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 8px;
      background: rgba(0,0,0,0.58);
      color: #fff;
      cursor: pointer;
      padding: 0.8rem 1rem;
      font: 900 0.72rem "Orbitron", monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
    }

    @media (max-width: 640px) {
      .intro-skip { right: 14px; bottom: 14px; }
    }

    /* ── Hero ── */
    .hero {
      width: 100%;
      max-width: 1120px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      gap: clamp(1.5rem, 5vw, 4rem);
      align-items: center;
      padding: clamp(2.5rem, 7vw, 6rem) 0 clamp(2rem, 5vw, 3rem);
    }

    .hero-copy { min-width: 0; }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-family: "Orbitron", monospace;
      font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--signal);
      border: 1px solid rgba(0,245,255,0.48);
      padding: 0.5em 1.1em; border-radius: 999px; margin-bottom: 1.35rem;
      box-shadow: 0 0 20px rgba(0,245,255,0.18), inset 0 0 10px rgba(0,245,255,0.08);
      animation: badgePulse 3s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%,100% { box-shadow: 0 0 20px rgba(0,245,255,0.18), inset 0 0 10px rgba(0,245,255,0.08); }
      50%      { box-shadow: 0 0 34px rgba(255,176,0,0.22), inset 0 0 18px rgba(255,176,0,0.1); }
    }
    .hero-title {
      font-family: "Orbitron", monospace;
      font-size: clamp(2.8rem, 8vw, 6.3rem);
      font-weight: 900; line-height: 1.1;
      letter-spacing: 0;
      background: linear-gradient(135deg, #fff 8%, var(--ember) 38%, var(--signal) 72%, #fff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,176,0,0.22));
      margin-bottom: 1rem;
    }
    .hero-sub {
      max-width: 42rem;
      font-size: clamp(1rem, 2vw, 1.18rem);
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 0.02em;
    }
    .hero-sub span { color: var(--paper); font-weight: 900; }

    .hero-panel {
      position: relative;
      min-height: 320px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03)),
        #0b0e14;
      box-shadow: 0 30px 90px rgba(0,0,0,0.42);
    }

    .hero-panel::before {
      content: "";
      position: absolute; inset: 0;
      background:
        linear-gradient(140deg, rgba(255,176,0,0.16), transparent 42%),
        linear-gradient(320deg, rgba(0,245,255,0.16), transparent 48%);
      z-index: 1;
    }

    .hero-panel img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: saturate(1.14) contrast(1.08);
      opacity: 0.82;
    }

    .hero-panel-copy {
      position: absolute;
      left: 1.2rem; right: 1.2rem; bottom: 1.15rem;
      z-index: 2;
      display: flex; justify-content: space-between; align-items: end; gap: 1rem;
      color: var(--paper);
      font-family: "Orbitron", monospace;
      text-transform: uppercase;
    }

    .hero-panel-copy strong { display: block; font-size: 1.05rem; letter-spacing: 0.08em; }
    .hero-panel-copy span { display: block; margin-top: 0.35rem; font-size: 0.62rem; color: rgba(255,255,255,0.62); letter-spacing: 0.18em; }

    .hero-scan {
      width: 4rem; height: 4rem;
      border: 1px solid rgba(0,245,255,0.55);
      border-radius: 50%;
      display: grid; place-items: center;
      color: var(--signal);
      box-shadow: 0 0 24px rgba(0,245,255,0.3);
      animation: scanSpin 8s linear infinite;
    }

    @keyframes scanSpin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      width: 100%; max-width: 1120px;
      display: flex; align-items: center; gap: 1rem;
      margin: 0.5rem 0 1.5rem;
    }
    .divider::before,.divider::after {
      content:""; flex:1; height:1px;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
    }
    .divider span {
      font-family:"Orbitron",monospace; font-size:0.62rem;
      letter-spacing:0.2em; color:rgba(255,255,255,0.52); white-space:nowrap; text-transform:uppercase;
    }

    /* ── Home Leaderboards ── */
    .leaderboard-board {
      width: 100%;
      max-width: 1120px;
      margin: 0 0 2rem;
    }

    .section-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .section-heading h2 {
      font-family: "Orbitron", monospace;
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      color: var(--paper);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .section-heading p {
      color: rgba(255,255,255,0.45);
      font-size: 0.86rem;
      line-height: 1.6;
      text-align: right;
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .leaderboard-card {
      position: relative;
      overflow: hidden;
      min-width: 0;
      min-height: 17.25rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.085), rgba(255,255,255,0.03)),
        rgba(6,8,13,0.82);
      box-shadow: 0 16px 48px rgba(0,0,0,0.24);
    }

    .leaderboard-card::before {
      content: "";
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--c-accent, var(--signal)) 18%, transparent), transparent 46%),
        radial-gradient(circle at 90% 5%, color-mix(in srgb, var(--c-accent, var(--signal)) 22%, transparent), transparent 12rem);
      pointer-events: none;
    }

    .leaderboard-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .leaderboard-title {
      min-width: 0;
    }

    .leaderboard-title strong {
      display: block;
      color: #fff;
      font-size: 1rem;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .leaderboard-title span {
      display: block;
      margin-top: 0.25rem;
      color: var(--c-accent, var(--signal));
      font: 900 0.58rem "Orbitron", monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .leaderboard-rank-badge {
      flex: 0 0 auto;
      width: 2.25rem;
      height: 2.25rem;
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--c-accent, var(--signal)) 62%, transparent);
      border-radius: 8px;
      color: #06100b;
      background: var(--c-accent, var(--signal));
      font: 900 0.78rem "Orbitron", monospace;
      box-shadow: 0 0 22px color-mix(in srgb, var(--c-accent, var(--signal)) 32%, transparent);
    }

    .leaderboard-list {
      position: relative;
      display: grid;
      gap: 0.5rem;
      padding: 0.85rem 1rem 1rem;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 2rem minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.65rem;
      min-height: 2rem;
      padding: 0.42rem 0.55rem;
      border: 1px solid rgba(255,255,255,0.075);
      border-radius: 7px;
      background: rgba(0,0,0,0.22);
      min-width: 0;
    }

    .leaderboard-row:first-child {
      border-color: color-mix(in srgb, var(--c-accent, var(--signal)) 48%, transparent);
      background: color-mix(in srgb, var(--c-accent, var(--signal)) 13%, rgba(0,0,0,0.24));
    }

    .leaderboard-rank {
      color: rgba(255,255,255,0.75);
      font: 900 0.72rem "Orbitron", monospace;
      text-align: center;
    }

    .leaderboard-name {
      min-width: 0;
      color: rgba(255,255,255,0.86);
      font-size: 0.88rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-score {
      color: var(--c-accent, var(--signal));
      font: 900 0.84rem "Orbitron", monospace;
      white-space: nowrap;
      min-width: 0;
    }

    .leaderboard-note {
      color: rgba(255,255,255,0.42);
      font-size: 0.76rem;
      margin-top: -0.25rem;
      padding-left: 2.65rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .leaderboard-state {
      padding: 2.5rem 1rem;
      color: rgba(255,255,255,0.48);
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    /* ── Game Grid ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.75rem;
      width: 100%; max-width: 1120px;
    }

    /* ── Game Card ── */
    .game-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none; color: inherit;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.035));
      border: 1px solid var(--line);
      transition: transform 0.3s cubic-bezier(.22,1,.36,1), box-shadow 0.3s, border-color 0.3s;
      display: flex; flex-direction: column;
      min-height: 100%;
      box-shadow: 0 16px 50px rgba(0,0,0,0.22);
    }
    .game-card:hover {
      transform: translateY(-8px);
      border-color: var(--c-accent, var(--neon-cyan));
      box-shadow:
        0 0 32px color-mix(in srgb, var(--c-accent, var(--neon-cyan)) 35%, transparent),
        0 16px 48px rgba(0,0,0,0.7);
    }

    /* artwork canvas */
    .card-art {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      position: relative;
      overflow: hidden;
      background: #080a10;
    }
    .card-art img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: saturate(1.12) contrast(1.08);
      transform: scale(1.01);
      transition: transform 0.45s ease, opacity 0.45s ease;
    }
    .card-art canvas {
      position: absolute;
      right: 0.75rem; bottom: 0.75rem;
      width: 42%; height: 42%;
      display: block;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      background: rgba(0,0,0,0.34);
      box-shadow: 0 14px 38px rgba(0,0,0,0.48);
      backdrop-filter: blur(8px);
    }
    .game-card:hover .card-art img {
      transform: scale(1.06);
    }

    /* shine sweep on hover */
    .card-art::after {
      content:"";
      position: absolute; inset:0;
      background:
        linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.11) 50%, transparent 70%),
        linear-gradient(0deg, rgba(0,0,0,0.72), transparent 48%);
      transform: translateX(-100%);
      transition: transform 0s;
      pointer-events: none;
    }
    .game-card:hover .card-art::after {
      transform: translateX(100%);
      transition: transform 0.6s ease;
    }

    /* bottom info */
    .card-body {
      padding: 1.25rem 1.4rem 1.4rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      flex: 1;
    }
    .card-meta {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .card-tag {
      font-family: "Orbitron", monospace;
      font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--c-accent, var(--neon-cyan));
      border: 1px solid currentColor;
      padding: 0.15em 0.65em; border-radius: 999px;
    }
    .card-stars { font-size: 0.75rem; color: #ffe600; letter-spacing: -1px; }
    .card-name {
      font-size: 1.25rem; font-weight: 900; color: #fff;
      letter-spacing: 0.01em; line-height: 1.2;
    }
    .card-desc { font-size: 0.86rem; color: rgba(255,255,255,0.58); line-height: 1.7; }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 0.75rem; padding-top: 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .card-play-btn {
      font-family: "Orbitron", monospace;
      font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: #06100b;
      background: var(--c-accent, var(--neon-cyan));
      padding: 0.45em 1.1em; border-radius: 6px;
      box-shadow: 0 0 14px color-mix(in srgb, var(--c-accent, var(--neon-cyan)) 50%, transparent);
      transition: filter 0.2s, transform 0.2s;
    }
    .game-card:hover .card-play-btn {
      filter: brightness(1.2);
      transform: scale(1.05);
    }
    .card-num {
      font-family: "Orbitron", monospace;
      font-size: 0.7rem; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.28);
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 2;
      text-align: center; padding: 2rem;
      font-size: 0.72rem; color: rgba(255,255,255,0.18); letter-spacing: 0.05em;
    }
    footer span { color: rgba(255,176,0,0.55); }

    @media (max-width: 760px) {
      .page { padding: 1rem 1rem 3rem; }
      .topbar { align-items: flex-start; justify-content: flex-start; flex-wrap: wrap; gap: 0.6rem; }
      .brand { font-size: 0.68rem; }
      .brand-mark { width: 2rem; height: 2rem; }
      .music-toggle {
        position: static;
        flex: 0 0 auto;
        padding: 0.7rem 0.78rem;
        font-size: 0.64rem;
      }
      .topbar,
      .hero,
      .divider,
      .leaderboard-board,
      .game-grid {
        width: calc(100vw - 2rem);
        max-width: calc(100vw - 2rem);
      }
      .hero-copy,
      .hero-sub,
      .hero-title {
        max-width: 100%;
      }
      .hero { grid-template-columns: 1fr; padding-top: 2rem; }
      .hero-panel { min-height: 240px; }
      .hero-title { font-size: clamp(2.5rem, 15vw, 4.2rem); }
      .section-heading { align-items: flex-start; flex-direction: column; }
      .section-heading p { text-align: left; }
      .leaderboard-grid { grid-template-columns: 1fr; }
      .leaderboard-row {
        grid-template-columns: 1.75rem minmax(0, 1fr);
        gap: 0.45rem;
      }
      .leaderboard-score {
        grid-column: 2;
        font-size: 0.76rem;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .leaderboard-note {
        padding-left: 2.35rem;
        font-size: 0.7rem;
      }
      .game-grid { grid-template-columns: 1fr; }
      .card-art canvas { width: 44%; height: 44%; }
    }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="entry-gate" id="entryGate">
  <div class="entry-card">
    <strong>Ready Player?</strong>
    <p>進入遊戲大廳</p>
    <button id="enterHubBtn" type="button">進入遊戲大廳</button>
  </div>
</div>

<div class="intro-video-screen" id="introVideoScreen">
  <video id="zombieIntroVideo" src="assets/video/zombie-intro.mp4" preload="metadata" playsinline></video>

<!-- ══════════════════ STARFIELD ══════════════════ -->
<script>
(function(){
  const c = document.getElementById("starfield");
  const ctx = c.getContext("2d");
  let stars=[];
  function resize(){
    c.width=innerWidth; c.height=innerHeight;
    stars=Array.from({length:180},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.2+0.2, a:Math.random()*0.6+0.1,
      sp:Math.random()*0.015+0.004, ph:Math.random()*Math.PI*2
    }));
  }
  function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      const a=s.a*(0.65+0.35*Math.sin(t*s.sp*60+s.ph));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,230,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener("resize",resize); resize(); requestAnimationFrame(draw);
})();
</script>

<!-- ══════════════════ CARD ART PAINTERS ══════════════════ -->
<script>
/* ── Painter 1: Balloon Shooter ─────────────────────────── */
function paintBalloonShooter(canvas) {
  const W = canvas.width = 560, H = canvas.height = 315;
  const ctx = canvas.getContext("2d");

  // balloons state
  const COLORS = ["#ff4d6d","#ff9500","#ffdd00","#69db7c","#74c0fc","#cc5de8","#ff6b9d"];
  const balloons = Array.from({length:14}, (_, i) => ({
    x: 60 + (i % 7) * 70 + Math.random()*20,
    y: H + 60 + Math.random() * 120,
    vy: -(0.55 + Math.random()*0.5),
    r: 22 + Math.random()*12,
    color: COLORS[i % COLORS.length],
    wobble: Math.random()*Math.PI*2,
    wSpeed: 0.025 + Math.random()*0.015,
    popped: false,
    popFrame: 0
  }));

  // crosshair
  let aim = {x: W/2, y: H/2, tx: W*0.35, ty: H*0.45, speed: 0.018};
  const aimTargets = [{x:W*0.35,y:H*0.45},{x:W*0.6,y:H*0.3},{x:W*0.2,y:H*0.55},{x:W*0.75,y:H*0.5},{x:W*0.5,y:H*0.38}];
  let aimIdx = 0;

  // particles
  const particles = [];
  function spawnParticles(x, y, color) {
    for (let i=0;i<14;i++) {
      const a = Math.random()*Math.PI*2;
      const sp = 2+Math.random()*4;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:3+Math.random()*3,
        color, alpha:1, life:0, maxLife:28+Math.random()*12});
    }
  }

  let frame = 0;
  function draw() {
    frame++;
    // background
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#0b1a2e"); bg.addColorStop(1,"#1a0b2e");
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    // far stars
    ctx.fillStyle="rgba(255,255,255,0.5)";
    for(let i=0;i<60;i++){
      const sx=((i*137+23)%W), sy=((i*79+11)%H);
      ctx.fillRect(sx,sy,1,1);
    }

    // clouds
    for(let c=0;c<3;c++){
      const cx = ((frame*0.18+c*180)%( W+160))-80;
      const cy = 40+c*28;
      ctx.fillStyle=`rgba(255,255,255,${0.04+c*0.02})`;
      ctx.beginPath(); ctx.ellipse(cx,cy,60+c*20,18,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+30,cy-10,40,14,0,0,Math.PI*2); ctx.fill();
    }

    // move aim toward target
    aim.x += (aim.tx - aim.x)*aim.speed;
    aim.y += (aim.ty - aim.y)*aim.speed;
    if(Math.abs(aim.x-aim.tx)<2 && Math.abs(aim.y-aim.ty)<2){
      aimIdx=(aimIdx+1)%aimTargets.length;
      aim.tx=aimTargets[aimIdx].x; aim.ty=aimTargets[aimIdx].y;
      // find nearest balloon to aim
      let nearest=null, dist=1e9;
      balloons.forEach(b=>{ if(!b.popped){ const d=Math.hypot(b.x-aim.tx,b.y-aim.ty); if(d<dist){dist=d;nearest=b;} }});
      if(nearest && dist<50){ nearest.popped=true; spawnParticles(nearest.x,nearest.y,nearest.color); }
    }

    // balloons
    balloons.forEach(b => {
      if(b.popped){
        b.popFrame++;
        if(b.popFrame>40){ b.y=H+80; b.x=50+Math.random()*460; b.vy=-(0.55+Math.random()*0.5); b.popped=false; b.popFrame=0; }
        return;
      }
      b.y += b.vy;
      b.wobble += b.wSpeed;
      const wx = Math.sin(b.wobble)*3;
      if(b.y < -b.r*2) { b.y = H+60; b.x=50+Math.random()*460; }
      const bx = b.x+wx, by = b.y;

      // shadow
      ctx.save();
      ctx.shadowColor=b.color; ctx.shadowBlur=18;
      // balloon body
      const g = ctx.createRadialGradient(bx-b.r*0.3,by-b.r*0.35,b.r*0.05,bx,by,b.r);
      g.addColorStop(0,"rgba(255,255,255,0.9)");
      g.addColorStop(0.3,b.color);
      g.addColorStop(1, b.color.replace(")",",0.7)").replace("rgb","rgba"));
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.ellipse(bx, by, b.r*0.85, b.r, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // knot
      ctx.fillStyle=b.color;
      ctx.beginPath(); ctx.ellipse(bx,by+b.r,3,4,0,0,Math.PI*2); ctx.fill();
      // string
      ctx.strokeStyle="rgba(255,255,255,0.18)"; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(bx,by+b.r+3);
      ctx.bezierCurveTo(bx+8,by+b.r+20,bx-5,by+b.r+35,bx+3,by+b.r+50); ctx.stroke();
    });

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18;
      p.life++; p.alpha=1-p.life/p.maxLife;
      if(p.alpha<=0){particles.splice(i,1);continue;}
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.alpha,0,Math.PI*2);
      ctx.fillStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,"0");
      ctx.fill();
    }

    // crosshair
    const cx=aim.x, cy=aim.y;
    ctx.save();
    ctx.strokeStyle="rgba(255,60,60,0.9)"; ctx.lineWidth=1.5;
    // outer ring
    ctx.beginPath(); ctx.arc(cx,cy,18,0,Math.PI*2); ctx.stroke();
    // inner ring
    ctx.strokeStyle="rgba(255,60,60,0.5)";
    ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.stroke();
    // crosslines
    ctx.strokeStyle="rgba(255,60,60,0.85)"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-26,cy); ctx.lineTo(cx-10,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+10,cy); ctx.lineTo(cx+26,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-26); ctx.lineTo(cx,cy-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy+10); ctx.lineTo(cx,cy+26); ctx.stroke();
    // center dot
    ctx.fillStyle="rgba(255,60,60,0.9)";
    ctx.beginPath(); ctx.arc(cx,cy,2,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // vignette
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
    vg.addColorStop(0,"transparent"); vg.addColorStop(1,"rgba(0,0,0,0.55)");
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    // title overlay
    ctx.font="bold 13px 'Orbitron',monospace";
    ctx.fillStyle="rgba(255,255,255,0.08)";
    ctx.fillText("BALLOON SHOOTER", 14, H-14);

    requestAnimationFrame(draw);
  }
  draw();
}

/* ── Painter 3: Zombie Hunter ───────────────────────────── */
function paintZombieHunter(canvas) {
  const W = canvas.width = 560, H = canvas.height = 315;
  const ctx = canvas.getContext('2d');

  const player = { x: W/2, y: H/2, r: 11, vx: 1.2, vy: 0.8 };
  const zombies = Array.from({length:5}, (_,i) => ({
    x: 60+i*90+Math.random()*30, y: 60+Math.random()*(H-120),
    r: 13, vx:0, vy:0, wobble: Math.random()*Math.PI*2, wSpd: 1.5+Math.random()
  }));
  const particles = [];
  let frame = 0;
  let hunterMode = false, hunterTimer = 120;

  function burst(x,y,col) {
    for(let i=0;i<10;i++){
      const a=Math.random()*Math.PI*2, sp=60+Math.random()*120, ml=18+Math.random()*10;
      particles.push({x,y,vx:Math.cos(a)*sp/60,vy:Math.sin(a)*sp/60,r:2+Math.random()*2,col,life:ml,ml});
    }
  }

  function draw() {
    frame++;
    if(frame%180===0) { hunterMode=!hunterMode; hunterTimer=hunterMode?60:120; }
    if(hunterTimer>0) hunterTimer--;

    ctx.fillStyle='#070a12'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,200,255,0.04)'; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    if(hunterMode){
      ctx.save();
      ctx.strokeStyle=`rgba(255,140,0,${0.4+0.3*Math.sin(frame*0.15)})`;
      ctx.lineWidth=8; ctx.shadowBlur=18; ctx.shadowColor='#ff8800';
      ctx.strokeRect(4,4,W-8,H-8); ctx.restore();
    }

    // move player in figure-8
    player.x = W/2 + Math.sin(frame*0.018)*W*0.32;
    player.y = H/2 + Math.sin(frame*0.036)*H*0.26;

    // zombies flee
    zombies.forEach(z => {
      z.wobble += z.wSpd/60;
      const ex=z.x-player.x, ey=z.y-player.y;
      const ed=Math.sqrt(ex*ex+ey*ey)||1;
      const spd=hunterMode?0.55:1.8;
      const nx=Math.cos(z.wobble)*0.6, ny=Math.sin(z.wobble*1.3)*0.6;
      let fx=ex/ed+nx, fy=ey/ed+ny;
      const fl=Math.sqrt(fx*fx+fy*fy)||1;
      z.vx=(fx/fl)*spd; z.vy=(fy/fl)*spd;
      z.x+=z.vx; z.y+=z.vy;
      if(hunterMode){
        if(z.x<z.r){z.x=z.r;z.vx=Math.abs(z.vx);}
        if(z.x>W-z.r){z.x=W-z.r;z.vx=-Math.abs(z.vx);}
        if(z.y<z.r){z.y=z.r;z.vy=Math.abs(z.vy);}
        if(z.y>H-z.r){z.y=H-z.r;z.vy=-Math.abs(z.vy);}
      } else {
        if(z.x<-40||z.x>W+40||z.y<-40||z.y>H+40){
          z.x=80+Math.random()*(W-160); z.y=80+Math.random()*(H-160);
        }
      }
      // kill check
      const cx=player.x-z.x, cy=player.y-z.y;
      if(Math.sqrt(cx*cx+cy*cy)<player.r+z.r){
        burst(z.x,z.y,hunterMode?'#ff9900':'#00ff88');
        z.x=80+Math.random()*(W-160); z.y=80+Math.random()*(H-160);
      }
    });

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--;
      ctx.globalAlpha=Math.max(0,p.life/p.ml);
      ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      if(p.life<=0) particles.splice(i,1);
    }
    ctx.globalAlpha=1;

    // draw zombies
    zombies.forEach(z => {
      const col=hunterMode?'#ff9900':'#33dd66';
      ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=col;
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.font=`${z.r*1.6}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🧟',z.x,z.y+1); ctx.restore();
    });

    // draw player
    ctx.save(); ctx.shadowBlur=20; ctx.shadowColor='#00f5ff';
    ctx.fillStyle='#00f5ff'; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.font=`${player.r*1.6}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🏹',player.x,player.y+1); ctx.restore();

    // HUD
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold 11px Orbitron,sans-serif';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('生命: ❤️❤️❤️  擊殺: 0/15',12,10);
    ctx.textAlign='right';
    if(hunterMode){
      ctx.fillStyle='#ff9900'; ctx.fillText(`🔥 獵人模式 ${(hunterTimer/60).toFixed(1)}s`,W-12,10);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fillText(`獵人模式: ${(hunterTimer/60).toFixed(1)}s`,W-12,10);
    }

    ctx.font='bold 13px Orbitron,monospace';
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.textAlign='left'; ctx.fillText('ZOMBIE HUNTER',14,H-16);

    requestAnimationFrame(draw);
  }
  draw();
}

/* ── Painter 2: Rhythm Game ─────────────────────────────── */
function paintRhythm(canvas) {
  const W = canvas.width = 560, H = canvas.height = 315;
  const ctx = canvas.getContext("2d");

  const TRACKS = 5;
  const NOTE_COLORS = ["#ff2d78","#ff9500","#00f5ff","#bf5fff","#69db7c"];
  const trackX = Array.from({length:TRACKS},(_, i)=> W*0.18 + i*(W*0.65/(TRACKS-1)));
  const HIT_Y = H - 52;
  const NOTE_W = 32, NOTE_H = 14;

  const notes = [];
  let spawnTimer = 0;
  let frame = 0;

  function spawnNote(){
    const t = Math.floor(Math.random()*TRACKS);
    notes.push({t, x:trackX[t], y:-NOTE_H, speed:3.2+Math.random()*1.2, alpha:1, hit:false, hitFrame:0});
  }

  // EQ bars state
  const EQ_BARS = 48;
  const eqH = Array.from({length:EQ_BARS},()=>Math.random());
  const eqTarget = Array.from({length:EQ_BARS},()=>Math.random());

  // particles
  const particles=[];
  function spawnHitParticles(x,y,color){
    for(let i=0;i<10;i++){
      const a=Math.random()*Math.PI*2, sp=2+Math.random()*3.5;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,
        r:2+Math.random()*3,color,alpha:1,life:0,maxLife:22+Math.random()*8});
    }
  }

  function draw(){
    frame++;
    // bg
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#0a0616"); bg.addColorStop(1,"#120b24");
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // EQ bars (background ambience)
    for(let i=0;i<EQ_BARS;i++){
      if(Math.random()<0.08) eqTarget[i]=Math.random();
      eqH[i]+=(eqTarget[i]-eqH[i])*0.09;
      const bx = i*(W/EQ_BARS), bh = eqH[i]*H*0.55;
      const hue = 260+i*3;
      ctx.fillStyle=`hsla(${hue},80%,65%,0.12)`;
      ctx.fillRect(bx, H-bh, W/EQ_BARS-1, bh);
    }

    // track lanes
    for(let t=0;t<TRACKS;t++){
      const x = trackX[t];
      // lane line
      ctx.strokeStyle=`rgba(255,255,255,0.07)`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
      // hit zone glow
      const hg = ctx.createRadialGradient(x,HIT_Y,0,x,HIT_Y,28);
      hg.addColorStop(0,NOTE_COLORS[t].replace("rgb","rgba").replace(")",",0.35)"));
      hg.addColorStop(1,"transparent");
      ctx.fillStyle=hg; ctx.fillRect(x-30,HIT_Y-28,60,56);
      // hit ring
      ctx.strokeStyle=NOTE_COLORS[t]+"55"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(x,HIT_Y,14,0,Math.PI*2); ctx.stroke();
    }

    // spawn notes
    spawnTimer++;
    if(spawnTimer > 22) { spawnNote(); spawnTimer=0; if(Math.random()<0.3)spawnNote(); }

    // notes
    for(let i=notes.length-1;i>=0;i--){
      const n=notes[i];
      if(n.hit){ n.hitFrame++; n.alpha=1-n.hitFrame/14; if(n.alpha<=0){notes.splice(i,1);continue;} }
      else { n.y+=n.speed; }
      if(!n.hit && n.y>H+NOTE_H){notes.splice(i,1);continue;}
      // auto-hit when close
      if(!n.hit && Math.abs(n.y-HIT_Y)<8){
        n.hit=true; spawnHitParticles(n.x,HIT_Y,NOTE_COLORS[n.t]);
      }

      ctx.save();
      ctx.globalAlpha=n.alpha;
      ctx.shadowColor=NOTE_COLORS[n.t]; ctx.shadowBlur=14;
      const ng=ctx.createLinearGradient(n.x-NOTE_W/2,n.y-NOTE_H/2,n.x+NOTE_W/2,n.y+NOTE_H/2);
      ng.addColorStop(0,"rgba(255,255,255,0.9)");
      ng.addColorStop(0.4,NOTE_COLORS[n.t]);
      ng.addColorStop(1,NOTE_COLORS[n.t]+"aa");
      ctx.fillStyle=ng;
      ctx.beginPath();
      ctx.roundRect(n.x-NOTE_W/2,n.y-NOTE_H/2,NOTE_W,NOTE_H,6);
      ctx.fill();
      ctx.restore();
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life++;
      p.alpha=1-p.life/p.maxLife;
      if(p.alpha<=0){particles.splice(i,1);continue;}
      ctx.globalAlpha=p.alpha;
      ctx.fillStyle=p.color; ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }

    // score flash
    if(frame%90<18){
      const score = Math.floor(frame/90)*1200+8400;
      ctx.font="bold 22px 'Orbitron',monospace";
      ctx.textAlign="right";
      ctx.fillStyle=`rgba(255,255,255,${0.7*(1-(frame%90)/18)})`;
      ctx.fillText(score.toLocaleString(), W-16, 34);
      ctx.textAlign="left";
    }

    // combo flash
    if(frame%70<14){
      ctx.font="bold 12px 'Orbitron',monospace";
      ctx.fillStyle=`rgba(0,245,255,${0.8*(1-(frame%70)/14)})`;
      ctx.fillText("PERFECT!", 16, H-16);
    }

    // vignette
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);
    vg.addColorStop(0,"transparent"); vg.addColorStop(1,"rgba(0,0,0,0.6)");
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

    ctx.font="bold 13px 'Orbitron',monospace";
    ctx.fillStyle="rgba(255,255,255,0.07)";
    ctx.fillText("RHYTHM MASTER", 14, H-14);

    requestAnimationFrame(draw);
  }
  draw();
}
</script>

<script>
const games = [
  {
    name: "射氣球大作戰",

  authDomain: "claude-code-project-3a0d3.firebaseapp.com",

  messagingSenderId: "451203824543",
  appId: "1:451203824543:web:fa2e9bb8c2c0f69c339baa"
};

const grid = document.getElementById("gameGrid");
const leaderboards = document.getElementById("homeLeaderboards");

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function formatScore(value) {
  const n = Number(value || 0);
  return Number.isFinite(n) ? n.toLocaleString("zh-TW") : "0";
}

function extraMeta(game, row) {
  if (game.collection === "rhythm_game") {
    const diff = row.difficulty ? `${row.difficulty}` : "";
    const acc = row.accuracy ? ` · ${row.accuracy}` : "";
    return `${diff}${acc}`;
  }
  if (game.collection === "zombie_hunter") {
    return typeof row.kills === "number" ? `擊殺 ${row.kills}` : "";
  }
  return "";
}

function createLeaderboardShell(game, index) {
  const card = document.createElement("article");
  card.className = "leaderboard-card";
  card.style.setProperty("--c-accent", game.accent);
  card.innerHTML = `
    <div class="leaderboard-head">
      <div class="leaderboard-title">
        <strong>${escapeHtml(game.name)}</strong>
        <span>${escapeHtml(game.tag)} Top 5</span>
      </div>
      <div class="leaderboard-rank-badge">0${index + 1}</div>
    </div>
    <div class="leaderboard-list" data-board="${escapeHtml(game.collection)}">
      <div class="leaderboard-state">載入排行榜中...</div>
    </div>
  `;
  leaderboards.appendChild(card);
}

function renderLeaderboard(game, rows) {
  const list = leaderboards.querySelector(`[data-board="${game.collection}"]`);
  if (!list) return;
  if (!rows.length) {
    list.innerHTML = '<div class="leaderboard-state">還沒有紀錄，第一名等你來拿。</div>';
    return;
  }
  const medals = ["1", "2", "3", "4", "5"];
  list.innerHTML = rows.map((row, index) => {
    const name = escapeHtml(row.name || "匿名玩家");
    const score = formatScore(row.score);
    const meta = escapeHtml(extraMeta(game, row));
    return `
      <div>
        <div class="leaderboard-row">
          <span class="leaderboard-rank">${medals[index]}</span>
          <span class="leaderboard-name">${name}</span>
          <span class="leaderboard-score">${score}</span>
        </div>
        ${meta ? `<div class="leaderboard-note">${meta}</div>` : ""}
      </div>
    `;
  }).join("");
}

function renderLeaderboardError(game) {
  const list = leaderboards.querySelector(`[data-board="${game.collection}"]`);
  if (list) list.innerHTML = '<div class="leaderboard-state">排行榜暫時讀取失敗，請稍後再試。</div>';
}

async function loadHomeLeaderboards() {
  games.forEach(createLeaderboardShell);
  if (!window.firebase) {
    games.forEach(renderLeaderboardError);
    return;
  }

  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  await Promise.all(games.map(async (game) => {
    try {
      const snap = await db.collection(game.collection).orderBy("score", "desc").limit(5).get();
      const rows = [];
      snap.forEach((doc) => rows.push(doc.data()));
      renderLeaderboard(game, rows);
    } catch (error) {
      console.error(`Failed to load ${game.collection}`, error);
      renderLeaderboardError(game);
    }
  }));
}

games.forEach((g, i) => {
  const card = document.createElement("a");
  card.className = "game-card";
  card.href = g.url;
  card.style.setProperty("--c-accent", g.accent);

  // art wrapper
  const artDiv = document.createElement("div");
  artDiv.className = "card-art";
  const img = document.createElement("img");
  img.src = g.icon;
  img.alt = `${g.name} 3A 風格圖示`;
  artDiv.appendChild(img);
  const cvs = document.createElement("canvas");
  cvs.setAttribute("aria-label", `${g.name} 動態預覽`);
  artDiv.appendChild(cvs);
  card.appendChild(artDiv);

  // body
  card.insertAdjacentHTML("beforeend", `
    <div class="card-body">
      <div class="card-meta">
        <span class="card-tag">${g.tag}</span>
        <span class="card-stars">${g.stars}</span>
      </div>
      <div class="card-name">${g.name}</div>
      <div class="card-desc">${g.desc}</div>
      <div class="card-footer">
        <div class="card-play-btn">▶ 開始遊玩</div>
        <div class="card-num">0${i+1}</div>
      </div>
    </div>
  `);

  grid.appendChild(card);

  // start painter after layout
  requestAnimationFrame(() => {
    if(g.painter === "balloon") paintBalloonShooter(cvs);
    if(g.painter === "rhythm")  paintRhythm(cvs);
    if(g.painter === "zombie")  paintZombieHunter(cvs);
  });
});

loadHomeLeaderboards();
</script>

<!-- ══════════════════ MUSIC CONTROLLER ══════════════════ -->
<script>
(function(){
  const btn = document.getElementById("musicToggle");
  const entryGate = document.getElementById("entryGate");
  const enterHubBtn = document.getElementById("enterHubBtn");
  const introVideoScreen = document.getElementById("introVideoScreen");
  const zombieIntroVideo = document.getElementById("zombieIntroVideo");
  const skipIntroVideoBtn = document.getElementById("skipIntroVideoBtn");
  const bgm = new Audio("assets/audio/Toward_the_Silent_Sun.mp3");
  bgm.loop = true;
  bgm.preload = "metadata";
  const bgmVolume = 0.45;
  bgm.volume = bgmVolume;
  let introStarted = false;
  let hubEntered = false;
  let bgmUnlocked = false;

  async function unlockBgmSilently() {
    if (bgmUnlocked) return;
    bgm.volume = 0;
    try {
      await bgm.play();
      bgmUnlocked = true;
    } catch (error) {
      console.error("Unable to unlock background music", error);
    }
  }

  async function start() {
    try {
      bgm.currentTime = 0;
      bgm.volume = bgmVolume;
      if (bgm.paused) await bgm.play();
      btn.classList.add("is-on");
      btn.setAttribute("aria-pressed", "true");
      btn.textContent = "Music On";
    } catch (error) {
      btn.textContent = "Music Blocked";
      console.error("Unable to play background music", error);
    }
  }

  function stop() {
    bgm.pause();
    bgm.volume = bgmVolume;
    btn.classList.remove("is-on");
    btn.setAttribute("aria-pressed", "false");
    btn.textContent = "Music Off";
  }

  async function showHub() {
    if (hubEntered) return;
    hubEntered = true;
    introVideoScreen.classList.remove("is-active");
    zombieIntroVideo.pause();
    zombieIntroVideo.currentTime = 0;
    await start();
  }

  async function enterHub() {
    if (introStarted) return;
    introStarted = true;
    await unlockBgmSilently();
    entryGate.classList.add("is-hidden");
    introVideoScreen.classList.add("is-active");
    try {
      zombieIntroVideo.currentTime = 0;
      await zombieIntroVideo.play();
    } catch (error) {
      console.error("Unable to play intro video", error);
      showHub();
    }
  }

  async function skipIntroVideo() {
    await showHub();
  }

  zombieIntroVideo.addEventListener("ended", showHub);
  skipIntroVideoBtn.addEventListener("click", skipIntroVideo);

  async function enterHubFromGate() {
    btn.textContent = "Music Off";
    btn.classList.remove("is-on");
    btn.setAttribute("aria-pressed", "false");
    await enterHub();
  }

  async function enterHubDirectly() {
    await start();
    entryGate.classList.add("is-hidden");
  }

  enterHubBtn.addEventListener("click", enterHubFromGate);
  entryGate.addEventListener("click", (event) => {
    if (event.target === entryGate) enterHubFromGate();
  });

  btn.addEventListener("click", () => {
    if (!bgm.paused) stop();
    else {
      entryGate.classList.add("is-hidden");
      if (hubEntered) start();
      else enterHubDirectly();
    }
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && !bgm.paused) stop();
  });
})();
</script>
